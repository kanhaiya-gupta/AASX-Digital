# AI/RAG System Query Configuration
# This file contains predefined queries and their parameters for the AI/RAG system

# Global settings
settings:
  default_analysis_type: "general"
  default_collection: "aasx_assets"
  default_limit: 5
  openai_model: "gpt-4.1-mini-2025-04-14"
  max_tokens: 500
  temperature: 0.7

# Predefined queries organized by category
queries:
  quality_analysis:
    - name: "quality_issues"
      query: "What are the main quality issues in the system?"
      analysis_type: "quality"
      description: "Identify quality problems and compliance gaps"
      
    - name: "compliance_status"
      query: "What is the current compliance status of all assets?"
      analysis_type: "quality"
      collection: "compliance_data"
      description: "Check compliance and certification status"
      
    - name: "quality_metrics"
      query: "What are the key quality metrics and their values?"
      analysis_type: "quality"
      description: "Extract quality measurement data"

  risk_assessment:
    - name: "safety_risks"
      query: "What are the potential safety risks in the manufacturing process?"
      analysis_type: "risk"
      description: "Identify safety concerns and risk factors"
      
    - name: "operational_risks"
      query: "What operational risks exist in the system?"
      analysis_type: "risk"
      description: "Analyze operational risk factors"
      
    - name: "compliance_risks"
      query: "What compliance risks should we be aware of?"
      analysis_type: "risk"
      collection: "compliance_data"
      description: "Identify compliance-related risks"

  optimization:
    - name: "performance_optimization"
      query: "How can we optimize the performance of the system?"
      analysis_type: "optimization"
      description: "Find performance improvement opportunities"
      
    - name: "efficiency_improvements"
      query: "What efficiency improvements can be made?"
      analysis_type: "optimization"
      description: "Identify efficiency enhancement opportunities"
      
    - name: "cost_optimization"
      query: "How can we reduce costs while maintaining quality?"
      analysis_type: "optimization"
      description: "Find cost optimization strategies"

  asset_analysis:
    - name: "asset_overview"
      query: "What assets are available in the system?"
      analysis_type: "general"
      collection: "aasx_assets"
      limit: 10
      description: "Get overview of all available assets"
      
    - name: "motor_assets"
      query: "Find all motor-related assets and their specifications"
      analysis_type: "general"
      collection: "aasx_assets"
      limit: 15
      description: "Search for motor assets specifically"
      
    - name: "sensor_assets"
      query: "What sensors are available and what do they measure?"
      analysis_type: "general"
      collection: "aasx_assets"
      limit: 10
      description: "Find sensor assets and their capabilities"

  submodel_analysis:
    - name: "submodel_overview"
      query: "What submodels are defined in the system?"
      analysis_type: "general"
      collection: "aasx_submodels"
      limit: 10
      description: "Get overview of all submodels"
      
    - name: "quality_submodels"
      query: "What quality-related submodels exist?"
      analysis_type: "quality"
      collection: "aasx_submodels"
      description: "Find quality-focused submodels"

  compliance_analysis:
    - name: "certification_status"
      query: "What certifications are required and what is their status?"
      analysis_type: "quality"
      collection: "compliance_data"
      description: "Check certification requirements and status"
      
    - name: "regulatory_compliance"
      query: "What regulatory requirements apply to this system?"
      analysis_type: "quality"
      collection: "compliance_data"
      description: "Identify regulatory compliance needs"

# Demo queries for testing
demo_queries:
  - name: "demo_quality"
    query: "What are the main quality issues in the system?"
    analysis_type: "quality"
    description: "Demo quality analysis"
    
  - name: "demo_risk"
    query: "What are the potential risks in the manufacturing process?"
    analysis_type: "risk"
    description: "Demo risk assessment"
    
  - name: "demo_optimization"
    query: "How can we optimize the production efficiency?"
    analysis_type: "optimization"
    description: "Demo optimization analysis"
    
  - name: "demo_general"
    query: "What assets are available in the system?"
    analysis_type: "general"
    description: "Demo general analysis"

# Custom query templates
templates:
  asset_search:
    query: "Find assets related to {keyword}"
    analysis_type: "general"
    collection: "aasx_assets"
    parameters:
      - keyword
    
  quality_check:
    query: "Check quality status for {component}"
    analysis_type: "quality"
    parameters:
      - component
    
  risk_assessment:
    query: "Assess risks for {process}"
    analysis_type: "risk"
    parameters:
      - process 