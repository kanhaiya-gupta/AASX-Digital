<script>
    console.log('🔍 AASX template scripts block loaded');
    console.log('🔍 Testing if JavaScript files load...');
    
    // System Status Checking
    async function checkSystemStatus() {
        try {
            // Check ETL Pipeline status
            const etlResponse = await fetch('/api/etl/status');
            const etlStatus = etlResponse.ok ? 'success' : 'error';
            updateStatusIndicator('status-etl', etlStatus);
            
            // Check Vector DB status
            const qdrantResponse = await fetch('/api/vector-db-info');
            const qdrantData = await qdrantResponse.json();
            const qdrantStatus = qdrantData.success ? 'success' : 'error';
            updateStatusIndicator('status-qdrant', qdrantStatus);
            
            // Check Neo4j status
            const neo4jResponse = await fetch('/api/neo4j/status');
            const neo4jStatus = neo4jResponse.ok ? 'success' : 'error';
            updateStatusIndicator('status-neo4j', neo4jStatus);
            
            // Check System status
            const systemResponse = await fetch('/api/system/status');
            const systemStatus = systemResponse.ok ? 'success' : 'error';
            updateStatusIndicator('status-system', systemStatus);
            
            // Check Storage status
            const storageResponse = await fetch('/api/storage/status');
            const storageStatus = storageResponse.ok ? 'success' : 'error';
            updateStatusIndicator('status-storage', storageStatus);
            
            // Check Processing status
            const processingResponse = await fetch('/api/processing/status');
            const processingStatus = processingResponse.ok ? 'success' : 'error';
            updateStatusIndicator('status-processing', processingStatus);
            
        } catch (error) {
            console.error('Error checking system status:', error);
            // Set all indicators to error state
            ['status-etl', 'status-qdrant', 'status-neo4j', 'status-system', 'status-storage', 'status-processing'].forEach(id => {
                updateStatusIndicator(id, 'error');
            });
        }
    }
    
    function updateStatusIndicator(elementId, status) {
        const element = document.getElementById(elementId);
        if (!element) return;
        
        const icon = element.querySelector('i');
        if (!icon) return;
        
        // Remove existing status classes
        element.classList.remove('status-success', 'status-error', 'status-warning');
        icon.classList.remove('text-success', 'text-danger', 'text-warning', 'text-muted');
        
        // Add new status classes
        switch (status) {
            case 'success':
                element.classList.add('status-success');
                icon.classList.add('text-success');
                break;
            case 'error':
                element.classList.add('status-error');
                icon.classList.add('text-danger');
                break;
            case 'warning':
                element.classList.add('status-warning');
                icon.classList.add('text-warning');
                break;
            default:
                icon.classList.add('text-muted');
        }
    }
    
    // Initialize system status on page load
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 AASX page initialized');
        checkSystemStatus();
        
        // Check status every 30 seconds
        setInterval(checkSystemStatus, 30000);
    });
</script>
