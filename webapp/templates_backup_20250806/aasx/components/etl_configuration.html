<!-- ETL Configuration Component -->
<div class="card bg-light border-0 h-100">
    <div class="card-body">
        <h6 class="text-primary mb-3">
            <i class="fas fa-cog me-2"></i>
            ETL Configuration
        </h6>
        
        <form id="etlConfigForm">
            <!-- Extract Configuration -->
            <div class="config-section mb-4">
                <h6 class="text-success mb-3">
                    <i class="fas fa-download me-1"></i>Extract Configuration
                </h6>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Processing Mode</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="processingMode" id="standardProcessing" value="standard" checked>
                        <label class="form-check-label" for="standardProcessing">
                            <i class="fas fa-play-circle text-success me-1"></i>Standard Processing
                            <small class="text-muted d-block">Basic extraction with core data</small>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="processingMode" id="enhancedProcessing" value="enhanced">
                        <label class="form-check-label" for="enhancedProcessing">
                            <i class="fas fa-rocket text-warning me-1"></i>Enhanced Processing
                            <small class="text-muted d-block">Full extraction with documents & images</small>
                        </label>
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="parallelProcessing" checked>
                        <label class="form-check-label" for="parallelProcessing">
                            <i class="fas fa-layer-group text-info me-1"></i>Parallel Processing
                            <small class="text-muted d-block">Multi-threaded for faster execution</small>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Transform Configuration -->
            <div class="config-section mb-4">
                <h6 class="text-info mb-3">
                    <i class="fas fa-exchange-alt me-1"></i>Transform Configuration
                </h6>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Data Quality</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="dataQuality" id="basicValidation" value="basic" checked>
                        <label class="form-check-label" for="basicValidation">
                            <i class="fas fa-check-circle text-success me-1"></i>Basic Validation
                            <small class="text-muted d-block">Essential data checks</small>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="dataQuality" id="enhancedValidation" value="enhanced">
                        <label class="form-check-label" for="enhancedValidation">
                            <i class="fas fa-shield-alt text-warning me-1"></i>Enhanced Validation & Cleaning
                            <small class="text-muted d-block">Comprehensive quality checks & data cleaning</small>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Load Configuration -->
            <div class="config-section mb-4">
                <h6 class="text-warning mb-3">
                    <i class="fas fa-upload me-1"></i>Load Configuration
                </h6>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Output Formats</label>
                    <div class="row">
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="jsonExport" checked>
                                <label class="form-check-label" for="jsonExport">
                                    <i class="fas fa-file-code text-primary me-1"></i>JSON Export
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="yamlExport" checked>
                                <label class="form-check-label" for="yamlExport">
                                    <i class="fas fa-file-alt text-success me-1"></i>YAML Export
                                </label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="graphExport" checked>
                                <label class="form-check-label" for="graphExport">
                                    <i class="fas fa-project-diagram text-info me-1"></i>Graph Export
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rdfExport" checked>
                                <label class="form-check-label" for="rdfExport">
                                    <i class="fas fa-sitemap text-warning me-1"></i>RDF Export
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Database Export</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="sqliteExport" checked>
                        <label class="form-check-label" for="sqliteExport">
                            <i class="fas fa-database text-primary me-1"></i>SQLite Export
                            <small class="text-muted d-block">Local database storage</small>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="vectorDbExport">
                        <label class="form-check-label" for="vectorDbExport">
                            <i class="fas fa-brain text-info me-1"></i>Vector DB Export
                            <small class="text-muted d-block">AI/RAG vector database</small>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Privacy & AI Settings -->
            <div class="config-section mb-4">
                <h6 class="text-danger mb-3">
                    <i class="fas fa-shield-alt me-1"></i>Privacy & AI Settings
                </h6>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">User Consent</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="enableFederatedLearning">
                        <label class="form-check-label" for="enableFederatedLearning">
                            <i class="fas fa-network-wired text-success me-1"></i>Enable Federated Learning
                            <small class="text-muted d-block">Participate in distributed learning</small>
                        </label>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">AI/RAG Processing</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="enableAiRag">
                        <label class="form-check-label" for="enableAiRag">
                            <i class="fas fa-robot text-warning me-1"></i>Enable AI/RAG Processing
                            <small class="text-muted d-block">Generate embeddings for AI analysis</small>
                        </label>
                    </div>
                </div>
                
                <div class="mb-3" id="embeddingModelSection" style="display: none;">
                    <label class="form-label fw-bold">Embedding Model</label>
                    <select class="form-select form-select-sm" id="embeddingModel">
                        <option value="openai">OpenAI (text-embedding-ada-002)</option>
                        <option value="sentence_transformers">SentenceTransformers (all-MiniLM-L6-v2)</option>
                    </select>
                </div>
            </div>
            
            <!-- Configuration Summary -->
            <div class="config-summary mt-4 p-3 bg-white rounded border">
                <h6 class="text-primary mb-2">
                    <i class="fas fa-clipboard-list me-1"></i>Configuration Summary
                </h6>
                <div id="configSummary" class="small text-muted">
                    <div class="row">
                        <div class="col-6">
                            <strong>Processing:</strong> <span id="processingSummary">Standard</span><br>
                            <strong>Quality:</strong> <span id="qualitySummary">Basic</span><br>
                            <strong>Formats:</strong> <span id="formatsSummary">JSON, YAML</span>
                        </div>
                        <div class="col-6">
                            <strong>Database:</strong> <span id="databaseSummary">SQLite</span><br>
                            <strong>Privacy:</strong> <span id="privacySummary">Standard</span><br>
                            <strong>AI/RAG:</strong> <span id="aiSummary">Disabled</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Validation Messages -->
            <div id="validationMessages" class="mt-3"></div>
        </form>
    </div>
</div>

<style>
.config-section {
    border-left: 3px solid #e9ecef;
    padding-left: 15px;
}

.config-section h6 {
    font-size: 0.9rem;
    font-weight: 600;
}

.form-check-label {
    font-size: 0.9rem;
}

.form-check-label small {
    font-size: 0.75rem;
}

.config-summary {
    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
}

#validationMessages .alert {
    font-size: 0.85rem;
    padding: 0.5rem 0.75rem;
}

.form-select-sm {
    font-size: 0.85rem;
}
</style>
