<!-- ETL Pipeline Management -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-warning text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="fas fa-cogs me-2"></i>
            ETL Pipeline Management
        </h5>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-light btn-sm" id="runSelectedPipeline">
                <i class="fas fa-play me-1"></i>
                Run Selected Pipeline
            </button>
            <button type="button" class="btn btn-light btn-sm" id="runAllData">
                <i class="fas fa-rocket me-1"></i>
                Run ETL on All Data
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-8">
                <div class="card bg-light border-0">
                    <div class="card-body">
                        <h6 class="text-primary mb-3">
                            <i class="fas fa-list me-2"></i>
                            Project Files
                        </h6>
                        <div class="dropdown-section">
                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="form-label fw-bold mb-0">Select Use Case:</label>
                                    <button type="button" class="btn btn-sm btn-outline-primary" id="refreshEtlFiles">
                                        <i class="fas fa-sync-alt me-1"></i>
                                        Refresh Files
                                    </button>
                                </div>
                                <select class="form-select use-case-select mb-2" id="etlUseCaseSelect">
                                    <option value="">Choose a use case...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold mb-0">Select Project:</label>
                                <select class="form-select project-select" id="etlProjectSelect">
                                    <option value="">Choose a project...</option>
                                    <option value="" disabled>Select a use case first to see available projects</option>
                                </select>
                            </div>
                        </div>
                        <div class="file-list" id="etlFilesList">
                            <div class="text-center text-muted py-4">
                                <i class="fas fa-file-alt fa-3x mb-3 text-muted"></i>
                                <h5>No Files Available</h5>
                                <p>Select a project to view available files for ETL processing</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <!-- Include the new ETL Configuration Component -->
                {% include 'aasx/components/etl_configuration.html' %}
            </div>
        </div>
    </div>
</div>
