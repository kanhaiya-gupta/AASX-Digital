<!-- Federation Status Component -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card federated-card h-100">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-network-wired fa-3x text-primary"></i>
                </div>
                <h4 class="fw-bold text-primary mb-1" id="federationStatus">Inactive</h4>
                <p class="text-muted mb-0">Federation Status</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card federated-card h-100">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-sync fa-3x text-success"></i>
                </div>
                <h4 class="fw-bold text-success mb-1" id="aggregationRounds">0</h4>
                <p class="text-muted mb-0">Aggregation Rounds</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card federated-card h-100">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-users fa-3x text-info"></i>
                </div>
                <h4 class="fw-bold text-info mb-1" id="activeTwins">3</h4>
                <p class="text-muted mb-0">Active Twins</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card federated-card h-100">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-chart-line fa-3x text-warning"></i>
                </div>
                <h4 class="fw-bold text-warning mb-1" id="avgHealthScore">79.4%</h4>
                <p class="text-muted mb-0">Avg Health Score</p>
            </div>
        </div>
    </div>
</div>
