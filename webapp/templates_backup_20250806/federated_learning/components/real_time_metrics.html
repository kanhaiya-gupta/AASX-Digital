<!-- Real-time Metrics Component -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card federated-card">
            <div class="card-header bg-gradient-collaborative text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="fas fa-wifi me-2"></i>
                        Real-time Monitoring
                    </h5>
                    <span class="badge bg-light text-dark" id="connectionStatus">Connected</span>
                </div>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <canvas id="realTimeChart" height="150"></canvas>
                    </div>
                    <div class="col-md-4">
                        <div id="realTimeMetrics">
                            <!-- Real-time metrics will be populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
