<!-- Lifecycle Management Component -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="fas fa-play-circle me-2"></i>Lifecycle Management
        </h5>
        <div class="d-flex gap-2">
            <select class="form-select form-select-sm" id="lifecycleTwinFilter">
                <option value="">All Twins</option>
            </select>
            <button class="btn btn-sm btn-outline-primary" onclick="refreshLifecycleData()">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
    <div class="card-body">
        <!-- Lifecycle Status Overview -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-success mb-1" id="runningTwins">0</div>
                    <div class="text-muted">Running</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-warning mb-1" id="stoppedTwins">0</div>
                    <div class="text-muted">Stopped</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-info mb-1" id="syncingTwins">0</div>
                    <div class="text-muted">Syncing</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-danger mb-1" id="errorTwins">0</div>
                    <div class="text-muted">Error</div>
                </div>
            </div>
        </div>

        <!-- Twin Lifecycle Table -->
        <div class="table-responsive">
            <table class="table table-hover" id="lifecycleTable">
                <thead>
                    <tr>
                        <th>Twin ID</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Last Operation</th>
                        <th>Uptime</th>
                        <th>Health</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="lifecycleTableBody">
                    <!-- Lifecycle rows will be populated here -->
                </tbody>
            </table>
        </div>

        <!-- Bulk Operations -->
        <div class="card mt-4">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="fas fa-layer-group me-2"></i>Bulk Operations
                </h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="selectAllTwins">
                            <label class="form-check-label" for="selectAllTwins">
                                Select All Twins
                            </label>
                        </div>
                        <div class="mt-2">
                            <small class="text-muted">Selected: <span id="selectedCount">0</span> twins</small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="btn-group" role="group">
                            <button class="btn btn-sm btn-success" onclick="bulkStartTwins()" disabled id="bulkStartBtn">
                                <i class="fas fa-play me-2"></i>Start All
                            </button>
                            <button class="btn btn-sm btn-warning" onclick="bulkStopTwins()" disabled id="bulkStopBtn">
                                <i class="fas fa-stop me-2"></i>Stop All
                            </button>
                            <button class="btn btn-sm btn-info" onclick="bulkSyncTwins()" disabled id="bulkSyncBtn">
                                <i class="fas fa-sync me-2"></i>Sync All
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lifecycle Events Timeline -->
        <div class="card mt-4">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="fas fa-history me-2"></i>Recent Lifecycle Events
                </h6>
            </div>
            <div class="card-body">
                <div class="timeline-container">
                    <div id="lifecycleTimeline">
                        <!-- Timeline events will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Lifecycle Operation Modal -->
<div class="modal fade" id="lifecycleOperationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="lifecycleOperationTitle">
                    <i class="fas fa-cog me-2"></i>Lifecycle Operation
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="lifecycleOperationContent">
                    <!-- Operation details will be populated here -->
                </div>
                <div class="progress mt-3 progress-container" id="operationProgress">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmOperationBtn">Confirm</button>
            </div>
        </div>
    </div>
</div>

<style>
.lifecycle-status {
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    font-weight: bold;
}

.lifecycle-status.running {
    background: #d4edda;
    color: #155724;
}

.lifecycle-status.stopped {
    background: #fff3cd;
    color: #856404;
}

.lifecycle-status.syncing {
    background: #d1ecf1;
    color: #0c5460;
}

.lifecycle-status.error {
    background: #f8d7da;
    color: #721c24;
}

.timeline-item {
    position: relative;
    padding: 1rem;
    border-left: 3px solid #dee2e6;
    margin-bottom: 1rem;
    background: #f8f9fa;
    border-radius: 0.25rem;
}

.timeline-item::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 1.5rem;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #6c757d;
}

.timeline-item.success {
    border-left-color: #28a745;
}

.timeline-item.success::before {
    background: #28a745;
}

.timeline-item.warning {
    border-left-color: #ffc107;
}

.timeline-item.warning::before {
    background: #ffc107;
}

.timeline-item.error {
    border-left-color: #dc3545;
}

.timeline-item.error::before {
    background: #dc3545;
}

.uptime-display {
    font-family: monospace;
    font-size: 0.875rem;
    color: #6c757d;
}

.health-indicator {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.5rem;
}

.health-indicator.excellent {
    background: #28a745;
}

.health-indicator.good {
    background: #17a2b8;
}

.health-indicator.warning {
    background: #ffc107;
}

.health-indicator.critical {
    background: #dc3545;
}
</style>
