<!-- Health Monitoring Component -->
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">
            <i class="fas fa-heartbeat me-2"></i>Twin Health Monitoring
        </h5>
    </div>
    <div class="card-body">
        <!-- Health Score Distribution -->
        <div class="row mb-4">
            <div class="col-md-6">
                <h6>Health Score Distribution</h6>
                                        <div class="chart-container medium">
                            <canvas id="healthDistributionChart"></canvas>
                        </div>
            </div>
            <div class="col-md-6">
                <h6>Health Score Trends</h6>
                                        <div class="chart-container medium">
                            <canvas id="healthTrendsChart"></canvas>
                        </div>
            </div>
        </div>
        
        <!-- Health Categories -->
        <div class="row">
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-success mb-1" id="excellentCount">0</div>
                    <div class="text-muted">Excellent (90-100%)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-warning mb-1" id="goodCount">0</div>
                    <div class="text-muted">Good (75-89%)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-info mb-1" id="warningCount">0</div>
                    <div class="text-muted">Warning (60-74%)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-danger mb-1" id="criticalCount">0</div>
                    <div class="text-muted">Critical (<60%)</div>
                </div>
            </div>
        </div>
        
        <!-- Individual Twin Health Status -->
        <div class="mt-4">
            <h6>Individual Twin Health Status</h6>
            <div id="individualTwinHealth" class="row">
                <!-- Individual twin health cards will be populated here -->
            </div>
        </div>
        
        <!-- Health Alerts -->
        <div class="mt-4">
            <h6>Health Alerts</h6>
            <div id="healthAlertsContainer">
                <div class="alert alert-success">
                    <i class="fas fa-check-circle me-2"></i>
                    No health alerts - all twins are healthy
                </div>
            </div>
        </div>
    </div>
</div>
