<!-- Twin Table Component -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="fas fa-list me-2"></i>Twin Registry Management
        </h5>
        <div class="d-flex gap-2">
            <input type="text" class="form-control form-control-sm" placeholder="Search twins..." id="twinSearchInput">
            <select class="form-select form-select-sm" id="twinTypeFilter">
                <option value="">All Types</option>
                <option value="aasx">AASX</option>
                <option value="generic">Generic</option>
                <option value="custom">Custom</option>
            </select>
            <select class="form-select form-select-sm" id="twinStatusFilter">
                <option value="">All Status</option>
                <option value="running">Running</option>
                <option value="stopped">Stopped</option>
                <option value="error">Error</option>
            </select>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover" id="twinTable">
                <thead>
                    <tr>
                        <th>
                            <input type="checkbox" class="form-check-input" id="selectAll">
                        </th>
                        <th>Twin ID</th>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Health</th>
                        <th>Owner</th>
                        <th>Last Sync</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="twinTableBody">
                    <!-- Twin rows will be populated here -->
                </tbody>
                <tbody id="loadingTwins" style="display: none;">
                    <tr>
                        <td colspan="9" class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2 mb-0">Loading twins...</p>
                        </td>
                    </tr>
                </tbody>
                <tbody id="emptyTwins" style="display: none;">
                    <tr>
                        <td colspan="9" class="text-center py-4">
                            <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                            <h5 class="text-muted">No twins found</h5>
                            <p class="text-muted">No digital twins match your current filters.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-muted">
                Showing <span id="showingStart">1</span> to <span id="showingEnd">10</span> of <span id="totalRecords">0</span> twins
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item">
                        <button class="page-link" id="prevPage" disabled>Previous</button>
                    </li>
                    <li class="page-item">
                        <button class="page-link" id="nextPage">Next</button>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
