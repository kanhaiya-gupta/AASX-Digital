<!-- Instance Management Component -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="fas fa-code-branch me-2"></i>Instance Management
        </h5>
        <div class="d-flex gap-2">
            <select class="form-select form-select-sm" id="instanceTwinFilter">
                <option value="">All Twins</option>
            </select>
            <button class="btn btn-sm btn-outline-primary" onclick="refreshInstanceData()">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
    <div class="card-body">
        <!-- Instance Summary -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-primary mb-1" id="totalInstances">0</div>
                    <div class="text-muted">Total Instances</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-success mb-1" id="activeInstances">0</div>
                    <div class="text-muted">Active Instances</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-info mb-1" id="latestVersion">v1</div>
                    <div class="text-muted">Latest Version</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center">
                    <div class="h4 text-warning mb-1" id="instanceHistory">0</div>
                    <div class="text-muted">History Items</div>
                </div>
            </div>
        </div>

        <!-- Instance Creation -->
        <div class="card mb-4">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="fas fa-plus me-2"></i>Create New Instance
                </h6>
            </div>
            <div class="card-body">
                <form id="instanceCreationForm">
                    <div class="row">
                        <div class="col-md-4">
                            <label for="instanceTwinSelect" class="form-label">Select Twin</label>
                            <select class="form-select" id="instanceTwinSelect" required>
                                <option value="">Choose a twin...</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="instanceType" class="form-label">Instance Type</label>
                            <select class="form-select" id="instanceType" required>
                                <option value="snapshot">Snapshot</option>
                                <option value="backup">Backup</option>
                                <option value="version">Version</option>
                                <option value="branch">Branch</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="instanceDescription" class="form-label">Description</label>
                            <input type="text" class="form-control" id="instanceDescription" placeholder="Instance description">
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12">
                            <div class="btn-group" role="group">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-plus me-2"></i>Create Instance
                                </button>
                                <button type="button" class="btn btn-success" onclick="createSnapshot()">
                                    <i class="fas fa-camera me-2"></i>Quick Snapshot
                                </button>
                                <button type="button" class="btn btn-warning" onclick="createBackup()">
                                    <i class="fas fa-save me-2"></i>Create Backup
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Instance List -->
        <div class="table-responsive">
            <table class="table table-hover" id="instanceTable">
                <thead>
                    <tr>
                        <th>Version</th>
                        <th>Instance ID</th>
                        <th>Twin Name</th>
                        <th>Type</th>
                        <th>Created</th>
                        <th>Created By</th>
                        <th>Status</th>
                        <th>Size</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="instanceTableBody">
                    <!-- Instance rows will be populated here -->
                </tbody>
            </table>
        </div>

        <!-- Instance Comparison -->
        <div class="card mt-4">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="fas fa-exchange-alt me-2"></i>Instance Comparison
                </h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-5">
                        <label for="instance1Select" class="form-label">Instance 1</label>
                        <select class="form-select" id="instance1Select">
                            <option value="">Select Instance</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label for="instance2Select" class="form-label">Instance 2</label>
                        <select class="form-select" id="instance2Select">
                            <option value="">Select Instance</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">&nbsp;</label>
                        <button class="btn btn-primary w-100" onclick="compareInstances()">
                            <i class="fas fa-search me-2"></i>Compare
                        </button>
                    </div>
                </div>
                <div id="comparisonResults" class="mt-3">
                    <!-- Comparison results will be shown here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Instance Details Modal -->
<div class="modal fade" id="instanceDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-cube me-2"></i>Instance Details
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="instanceDetailsContent">
                <!-- Instance details will be populated here -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" onclick="activateInstance()">Activate</button>
                <button type="button" class="btn btn-warning" onclick="restoreInstance()">Restore</button>
                <button type="button" class="btn btn-danger" onclick="deleteInstance()">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Instance Comparison Modal -->
<div class="modal fade" id="instanceComparisonModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-exchange-alt me-2"></i>Instance Comparison
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6>Instance 1</h6>
                        <div id="instance1Details">
                            <!-- Instance 1 details -->
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h6>Instance 2</h6>
                        <div id="instance2Details">
                            <!-- Instance 2 details -->
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <h6>Differences</h6>
                    <div id="instanceDifferences">
                        <!-- Differences will be shown here -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<style>
.instance-type-badge {
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    font-weight: bold;
}

.instance-type-badge.snapshot {
    background: #d1ecf1;
    color: #0c5460;
}

.instance-type-badge.backup {
    background: #fff3cd;
    color: #856404;
}

.instance-type-badge.version {
    background: #d4edda;
    color: #155724;
}

.instance-type-badge.branch {
    background: #f8d7da;
    color: #721c24;
}

.instance-status {
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    font-weight: bold;
}

.instance-status.active {
    background: #d4edda;
    color: #155724;
}

.instance-status.inactive {
    background: #f8d7da;
    color: #721c24;
}

.instance-status.archived {
    background: #e2e3e5;
    color: #383d41;
}

.version-number {
    font-family: monospace;
    font-weight: bold;
    color: #495057;
}

.instance-size {
    font-size: 0.875rem;
    color: #6c757d;
}

.comparison-diff {
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 0.25rem;
    padding: 1rem;
    font-family: monospace;
    font-size: 0.875rem;
    max-height: 400px;
    overflow-y: auto;
}

.comparison-diff .added {
    background: #d4edda;
    color: #155724;
}

.comparison-diff .removed {
    background: #f8d7da;
    color: #721c24;
}

.comparison-diff .unchanged {
    color: #6c757d;
}
</style>
