<!-- Performance Monitoring Component -->
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">
            <i class="fas fa-tachometer-alt me-2"></i>Advanced Performance Monitoring
        </h5>
    </div>
    <div class="card-body">
        <!-- Performance Charts -->
        <div class="row mb-4">
            <div class="col-md-6">
                <h6>Resource Usage by Twin</h6>
                <div class="chart-container medium">
                    <canvas id="resourceUsageChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <h6>Twin Health Distribution</h6>
                <div class="chart-container medium">
                    <canvas id="twinHealthDistributionChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- Performance Alerts -->
        <div class="row mb-4">
            <div class="col-12">
                <h6>Performance Alerts & Notifications</h6>
                <div id="performanceAlertsContainer">
                    <div class="alert alert-success">
                        <i class="fas fa-check-circle me-2"></i>
                        No Active Alerts - All twins are performing within normal parameters
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Individual Twin Performance -->
        <div class="row">
            <div class="col-12">
                <h6>Individual Twin Performance</h6>
                <div id="individualTwinPerformance" class="row">
                    <!-- Individual twin performance cards will be populated here -->
                </div>
            </div>
        </div>
    </div>
</div>
