<!-- System Information -->
<div class="card border-0 shadow-sm">
    <div class="card-header bg-gradient-dark text-white">
        <h5 class="mb-0">
            <i class="fas fa-info-circle me-2"></i>
            System Information
        </h5>
    </div>
    <div class="card-body">
        <div class="row text-center">
            <div class="col-6 mb-3">
                <div class="border rounded p-2">
                    <h6 class="mb-1" id="models-count">3</h6>
                    <small class="text-muted">Models</small>
                </div>
            </div>
            <div class="col-6 mb-3">
                <div class="border rounded p-2">
                    <h6 class="mb-1" id="simulations-count">1</h6>
                    <small class="text-muted">Simulations</small>
                </div>
            </div>
            <div class="col-6 mb-3">
                <div class="border rounded p-2">
                    <h6 class="mb-1" id="twins-count">3</h6>
                    <small class="text-muted">Twins</small>
                </div>
            </div>
            <div class="col-6 mb-3">
                <div class="border rounded p-2">
                    <h6 class="mb-1" id="validations-count">0</h6>
                    <small class="text-muted">Validations</small>
                </div>
            </div>
        </div>
    </div>
</div>
