<!-- Simulation Control Panel -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-success text-white">
        <h5 class="mb-0">
            <i class="fas fa-play-circle me-2"></i>
            Advanced Simulation Control
        </h5>
    </div>
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Model</label>
                <select class="form-select" id="simulation-model-select">
                    <option value="">Select a model...</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Simulation Type</label>
                <select class="form-select" id="simulation-type-select">
                    <option value="steady_state">Steady State</option>
                    <option value="transient">Transient</option>
                    <option value="optimization">Optimization</option>
                    <option value="parametric">Parametric Study</option>
                    <option value="sensitivity">Sensitivity Analysis</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Time Range (s)</label>
                <input type="number" class="form-control" id="time-range" value="100" min="1" max="10000">
            </div>
        </div>
        
        <!-- Advanced Simulation Settings -->
        <div class="card bg-light border-0 mb-3">
            <div class="card-header bg-secondary text-white">
                <h6 class="mb-0">
                    <i class="fas fa-sliders-h me-1"></i>
                    Advanced Settings
                </h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label class="form-label small">Time Step (s)</label>
                        <input type="number" class="form-control form-control-sm" id="time-step" value="0.1" step="0.01">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Convergence Tolerance</label>
                        <input type="number" class="form-control form-control-sm" id="convergence-tolerance" value="1e-6" step="1e-7">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Max Iterations</label>
                        <input type="number" class="form-control form-control-sm" id="max-iterations" value="1000">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Output Frequency</label>
                        <select class="form-select form-select-sm" id="output-frequency">
                            <option value="1">Every Step</option>
                            <option value="10">Every 10 Steps</option>
                            <option value="100">Every 100 Steps</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-success" id="start-simulation-btn">
                <i class="fas fa-play me-1"></i>Start Simulation
            </button>
            <button type="button" class="btn btn-warning" id="pause-simulation-btn" disabled>
                <i class="fas fa-pause me-1"></i>Pause
            </button>
            <button type="button" class="btn btn-danger" id="stop-simulation-btn" disabled>
                <i class="fas fa-stop me-1"></i>Stop
            </button>
            <button type="button" class="btn btn-info" id="monitor-simulation-btn">
                <i class="fas fa-chart-line me-1"></i>Monitor
            </button>
        </div>
    </div>
</div>
