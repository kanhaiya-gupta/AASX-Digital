<!-- Data Management Component -->
<div class="data-management-container">
    <div class="card">
        <div class="card-header">
            <h5 class="card-title">
                <i class="fas fa-database"></i>
                Data Management
            </h5>
        </div>
        <div class="card-body">
            <!-- Selection Display -->
            <div class="selection-display-container mb-3">
                <div class="alert alert-info">
                    <strong>Current Selection:</strong>
                    <span id="selection-display">No selection</span>
                </div>
            </div>

            <!-- Import Section -->
            <div class="import-section mb-4">
                <h6 class="section-title">
                    <i class="fas fa-upload"></i>
                    Import Data
                </h6>
                
                <div class="dropdown-section">
                    <div class="row">
                        <!-- Use Case Selection -->
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="use-case-select">Use Case</label>
                                <select id="use-case-select" class="form-control use-case-select">
                                    <option value="">Select Use Case...</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Project Selection -->
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="project-select">Project</label>
                                <select id="project-select" class="form-control project-select" disabled>
                                    <option value="">Select Project...</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- File Selection -->
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="file-select">File</label>
                                <select id="file-select" class="form-control file-select" disabled>
                                    <option value="">Select File...</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-3">
                    <div class="col-md-6">
                        <button id="import-data-btn" class="btn btn-primary" disabled>
                            <i class="fas fa-upload"></i>
                            Import File
                        </button>
                    </div>
                    <div class="col-md-6">
                        <button id="import-project-btn" class="btn btn-success" disabled>
                            <i class="fas fa-folder-open"></i>
                            Import All Project Files
                        </button>
                    </div>
                </div>
            </div>

            <!-- Export Section -->
            <div class="export-section mb-4">
                <h6 class="section-title">
                    <i class="fas fa-download"></i>
                    Export Data
                </h6>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="export-format-select">Export Format</label>
                            <select id="export-format-select" class="form-control">
                                <option value="json">JSON</option>
                                <option value="csv">CSV</option>
                                <option value="graphml">GraphML</option>
                                <option value="neo4j">Neo4j Dump</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>&nbsp;</label>
                            <button id="export-data-btn" class="btn btn-secondary btn-block" disabled>
                                <i class="fas fa-download"></i>
                                Export Data
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Import Status -->
            <div class="import-status-section">
                <h6 class="section-title">
                    <i class="fas fa-chart-bar"></i>
                    Import Status
                </h6>
                
                <div id="import-status" class="status-container">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="status-item">
                                <span class="status-label">Total Files:</span>
                                <span class="status-value">0</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="status-item">
                                <span class="status-label">Imported:</span>
                                <span class="status-value">0</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="status-item">
                                <span class="status-label">Pending:</span>
                                <span class="status-value">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading-indicator" class="loading-container" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="sr-only">Loading...</span>
                </div>
                <span class="loading-text ml-2"></span>
            </div>
        </div>
    </div>
</div>

<style>
.data-management-container {
    margin-bottom: 20px;
}

.section-title {
    color: #495057;
    border-bottom: 2px solid #e9ecef;
    padding-bottom: 8px;
    margin-bottom: 15px;
}

.selection-display-container {
    background-color: #f8f9fa;
    border-radius: 5px;
    padding: 10px;
}

.status-container {
    background-color: #f8f9fa;
    border-radius: 5px;
    padding: 15px;
}

.status-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #dee2e6;
}

.status-item:last-child {
    border-bottom: none;
}

.status-label {
    font-weight: 600;
    color: #495057;
}

.status-value {
    font-weight: bold;
    color: #007bff;
}

.loading-container {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-color: rgba(255, 255, 255, 0.9);
    border-radius: 5px;
    margin-top: 15px;
}

.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 20px;
    border-radius: 5px;
    color: white;
    font-weight: 500;
    z-index: 1000;
    animation: slideIn 0.3s ease-out;
}

.notification-success {
    background-color: #28a745;
}

.notification-error {
    background-color: #dc3545;
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

.form-group label {
    font-weight: 600;
    color: #495057;
    margin-bottom: 5px;
}

.btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.btn i {
    margin-right: 5px;
}
</style>
