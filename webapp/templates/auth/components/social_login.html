<!-- Social Login Section -->
<div class="auth-container" id="socialLoginSection">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-share-alt"></i> Social Login</h1>
            <p>Sign in with your social media account</p>
        </div>
        
        <div id="social-login-alert-container"></div>
        
        <!-- Social Login Buttons -->
        <div class="social-login-buttons">
            <button type="button" class="btn btn-outline-danger w-100 mb-2" data-action="social-login" data-provider="google">
                <i class="fab fa-google me-2"></i>
                Continue with Google
            </button>
            
            <button type="button" class="btn btn-outline-primary w-100 mb-2" data-action="social-login" data-provider="facebook">
                <i class="fab fa-facebook me-2"></i>
                Continue with Facebook
            </button>
            
            <button type="button" class="btn btn-outline-dark w-100 mb-2" data-action="social-login" data-provider="apple">
                <i class="fab fa-apple me-2"></i>
                Continue with Apple
            </button>
        </div>
        
        <div class="auth-footer">
            <p>Or <a href="#" data-action="show-email-login">sign in with email</a></p>
            <p><a href="/">Back to Dashboard</a></p>
        </div>
    </div>
</div>

<!-- Social Login Callback Handler -->
<div id="social-login-callback" style="display: none;">
    <div class="text-center">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Processing...</span>
        </div>
        <p class="mt-3">Processing social login...</p>
    </div>
</div>
