<form id="signupForm" class="auth-form">
    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="form-group">
                <label for="username" class="form-label">
                    <i class="fas fa-user me-2"></i>Username
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" class="form-control auth-form-control" id="username" name="username" 
                           placeholder="Choose a unique username" required>
                </div>
                <div class="form-text">Choose a unique username</div>
            </div>
        </div>
        
        <div class="col-md-6 mb-3">
            <div class="form-group">
                <label for="full_name" class="form-label">
                    <i class="fas fa-id-card me-2"></i>Full Name
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-id-card"></i>
                    </span>
                    <input type="text" class="form-control auth-form-control" id="full_name" name="full_name" 
                           placeholder="Your full name">
                </div>
                <div class="form-text">Your full name (optional)</div>
            </div>
        </div>
    </div>
    
    <div class="form-group">
        <label for="email" class="form-label">
            <i class="fas fa-envelope me-2"></i>Email Address
        </label>
        <div class="input-group">
            <span class="input-group-text">
                <i class="fas fa-envelope"></i>
            </span>
            <input type="email" class="form-control auth-form-control" id="email" name="email" 
                   placeholder="Enter your email address" required>
        </div>
        <div class="form-text">We'll never share your email</div>
    </div>
    
    <div class="form-group">
        <label for="organization_id" class="form-label">
            <i class="fas fa-building me-2"></i>Organization
        </label>
        <div class="input-group">
            <span class="input-group-text">
                <i class="fas fa-building"></i>
            </span>
            <select class="form-control auth-form-control" id="organization_id" name="organization_id">
                <option value="">Select Organization (Optional)</option>
                {% for org in organizations %}
                <option value="{{ org.org_id }}">{{ org.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-text">Choose your organization (optional)</div>
    </div>
    
    <div class="form-group">
        <label for="password" class="form-label">
            <i class="fas fa-lock me-2"></i>Password
        </label>
        <div class="input-group">
            <span class="input-group-text">
                <i class="fas fa-lock"></i>
            </span>
            <input type="password" class="form-control auth-form-control" id="password" name="password" 
                   placeholder="Create a strong password" required>
        </div>
        <div class="password-strength" id="passwordStrength"></div>
        <div class="form-text">Minimum 8 characters with uppercase, lowercase, and number</div>
    </div>
    
    <div class="form-group">
        <label for="confirm_password" class="form-label">
            <i class="fas fa-lock me-2"></i>Confirm Password
        </label>
        <div class="input-group">
            <span class="input-group-text">
                <i class="fas fa-lock"></i>
            </span>
            <input type="password" class="form-control auth-form-control" id="confirm_password" name="confirm_password" 
                   placeholder="Re-enter your password" required>
        </div>
        <div class="form-text">Re-enter your password</div>
    </div>
    
    <div class="form-group">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="agreeTerms" name="agreeTerms" required>
            <label class="form-check-label" for="agreeTerms">
                I agree to the <a href="#" onclick="showTermsModal()">Terms of Service</a> and <a href="#" onclick="showPrivacyModal()">Privacy Policy</a>
            </label>
        </div>
    </div>
    
    <button type="submit" class="btn auth-btn auth-btn-primary w-100" id="signupBtn">
        <span class="loading-spinner" id="loadingSpinner"></span>
        <span id="signupText">
            <i class="fas fa-user-plus me-2"></i>Create Account
        </span>
    </button>
</form>
