<!-- Authentication Status Dashboard -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-lg" style="border-left: 5px solid #007bff !important;">
            <div class="card-header bg-gradient-primary text-white" style="background: linear-gradient(135deg, #007bff 0%, #0056b3 100%) !important;">
                <h4 class="mb-0 fw-bold">
                    <i class="fas fa-shield-alt me-2"></i>
                    Authentication Status Dashboard
                    <span class="badge bg-light text-primary ms-2">Live</span>
                </h4>
            </div>
            <div class="card-body" style="background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);">
                <div class="row">
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-auth" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-user-shield fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Authentication</small>
                            <small class="d-block text-muted">Active</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-users" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-users fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">User Management</small>
                            <small class="d-block text-muted">Online</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-roles" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-user-tag fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Role Management</small>
                            <small class="d-block text-muted">Configured</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-security" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-lock fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Security</small>
                            <small class="d-block text-muted">Protected</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-sessions" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-clock fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Sessions</small>
                            <small class="d-block text-muted">Active</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-logs" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-clipboard-list fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Audit Logs</small>
                            <small class="d-block text-muted">Recording</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
