<!-- Security Settings -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-gradient-warning text-white">
                <h5 class="mb-0">
                    <i class="fas fa-shield-alt me-2"></i>
                    Security Settings
                </h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6 class="text-primary mb-3">
                            <i class="fas fa-lock me-2"></i>Password Policy
                        </h6>
                        <div class="mb-3">
                            <label class="form-label">Minimum Password Length</label>
                            <select class="form-select" id="minPasswordLength">
                                <option value="8" selected>8 characters</option>
                                <option value="10">10 characters</option>
                                <option value="12">12 characters</option>
                                <option value="16">16 characters</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="requireUppercase" checked>
                                <label class="form-check-label" for="requireUppercase">
                                    Require uppercase letters
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="requireLowercase" checked>
                                <label class="form-check-label" for="requireLowercase">
                                    Require lowercase letters
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="requireNumbers" checked>
                                <label class="form-check-label" for="requireNumbers">
                                    Require numbers
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="requireSpecialChars">
                                <label class="form-check-label" for="requireSpecialChars">
                                    Require special characters
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-primary mb-3">
                            <i class="fas fa-clock me-2"></i>Session Management
                        </h6>
                        <div class="mb-3">
                            <label class="form-label">Session Timeout (minutes)</label>
                            <select class="form-select" id="sessionTimeout">
                                <option value="15">15 minutes</option>
                                <option value="30" selected>30 minutes</option>
                                <option value="60">1 hour</option>
                                <option value="120">2 hours</option>
                                <option value="480">8 hours</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Maximum Login Attempts</label>
                            <select class="form-select" id="maxLoginAttempts">
                                <option value="3">3 attempts</option>
                                <option value="5" selected>5 attempts</option>
                                <option value="10">10 attempts</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Account Lockout Duration (minutes)</label>
                            <select class="form-select" id="lockoutDuration">
                                <option value="15">15 minutes</option>
                                <option value="30" selected>30 minutes</option>
                                <option value="60">1 hour</option>
                                <option value="1440">24 hours</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="enableMFA" checked>
                                <label class="form-check-label" for="enableMFA">
                                    Enable Multi-Factor Authentication
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="requireMFA" checked>
                                <label class="form-check-label" for="requireMFA">
                                    Require MFA for all users
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <button class="btn btn-primary" id="saveSecuritySettings">
                            <i class="fas fa-save me-2"></i>Save Security Settings
                        </button>
                        <button class="btn btn-outline-secondary" id="resetSecuritySettings">
                            <i class="fas fa-undo me-2"></i>Reset to Defaults
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
