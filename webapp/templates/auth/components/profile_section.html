<!-- Profile Section -->
<div class="auth-container-fluid container-fluid">
        <!-- Page Header -->
        <div class="auth-row row mb-4">
            <div class="auth-col-12 col-12">
                <div class="auth-page-header d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="auth-page-title h4 mb-0">
                            <i class="fas fa-user me-2"></i>
                            Profile Management
                        </h2>
                        <p class="auth-page-subtitle mb-0">Manage your personal information and account settings</p>
                    </div>
                    <div class="auth-page-actions d-flex gap-2">
                        <button class="auth-btn auth-btn-outline-primary" data-action="refresh-profile-data">
                            <i class="fas fa-sync-alt me-1"></i>
                            Refresh
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Completion Status -->
        <div class="auth-row row mb-4">
            <div class="auth-col-12 col-12">
                <div class="profile-completion-status">
                    <h5 class="mb-3">
                        <i class="fas fa-chart-line me-2"></i>
                        Profile Completion
                    </h5>
                    <div class="progress mb-3" style="height: 20px;">
                        <div class="progress-bar" id="completionProgress" role="progressbar" style="width: 0%">
                            <span id="completionPercentage">0%</span>
                        </div>
                    </div>
                    <div class="completion-steps" id="completionSteps">
                        <!-- Completion steps will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Form -->
        <div class="auth-row row">
            <div class="auth-col-12 col-12">
                <div class="auth-card card">
                    <div class="auth-card-header card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-user-edit me-2"></i>
                            Personal Information
                        </h5>
                    </div>
                    <div class="auth-card-body card-body">
                        <form id="profileForm" data-action="update-profile">
                            <div class="auth-row row">
                                <div class="auth-col-md-6 col-md-6 mb-3">
                                    <label for="full_name" class="form-label">Full Name *</label>
                                    <input type="text" class="form-control" id="full_name" name="full_name" required>
                                </div>
                                <div class="auth-col-md-6 col-md-6 mb-3">
                                    <label for="email" class="form-label">Email Address *</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                            </div>
                            
                            <div class="auth-row row">
                                <div class="auth-col-md-6 col-md-6 mb-3">
                                    <label for="phone" class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone" name="phone">
                                </div>
                                <div class="auth-col-md-6 col-md-6 mb-3">
                                    <label for="organization_id" class="form-label">Organization</label>
                                    <select class="form-control" id="organization_id" name="organization_id">
                                        <option value="">Select Organization</option>
                                        <option value="1">AASX Framework</option>
                                        <option value="2">Independent Research</option>
                                        <option value="3">Other</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="auth-row row">
                                <div class="auth-col-md-6 col-md-6 mb-3">
                                    <label for="job_title" class="form-label">Job Title</label>
                                    <input type="text" class="form-control" id="job_title" name="job_title">
                                </div>
                                <div class="auth-col-md-6 col-md-6 mb-3">
                                    <label for="department" class="form-label">Department</label>
                                    <input type="text" class="form-control" id="department" name="department">
                                </div>
                            </div>
                            
                            <div class="auth-row row">
                                <div class="auth-col-md-12 col-md-12 mb-3">
                                    <label for="bio" class="form-label">Bio</label>
                                    <textarea class="form-control" id="bio" name="bio" rows="3"></textarea>
                                </div>
                            </div>
                            
                            <div class="auth-form-actions d-flex gap-2">
                                <button type="submit" class="auth-btn auth-btn-primary" id="profileSubmit">
                                    <i class="fas fa-save me-2"></i>Update Profile
                                </button>
                                <button type="reset" class="auth-btn auth-btn-outline-secondary">
                                    <i class="fas fa-undo me-2"></i>Reset
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Password Change Form -->
        <div class="auth-row row mt-4">
            <div class="auth-col-12 col-12">
                <div class="auth-card card">
                    <div class="auth-card-header card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-key me-2"></i>
                            Change Password
                        </h5>
                    </div>
                    <div class="auth-card-body card-body">
                        <form id="changePasswordForm" data-action="change-password">
                            <div class="auth-row row">
                                <div class="auth-col-md-4 col-md-4 mb-3">
                                    <label for="currentPassword" class="form-label">Current Password *</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
                                        <button class="btn btn-outline-secondary" type="button" id="toggleCurrentPassword">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="auth-col-md-4 col-md-4 mb-3">
                                    <label for="newPassword" class="form-label">New Password *</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="newPassword" name="newPassword" required>
                                        <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <div id="passwordStrength" class="mt-2"></div>
                                </div>
                                <div class="auth-col-md-4 col-md-4 mb-3">
                                    <label for="confirmNewPassword" class="form-label">Confirm New Password *</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="confirmNewPassword" name="confirmNewPassword" required>
                                        <button class="btn btn-outline-secondary" type="button" id="toggleConfirmNewPassword">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="auth-form-actions d-flex gap-2">
                                <button type="submit" class="auth-btn auth-btn-primary" id="passwordSubmit">
                                    <i class="fas fa-key me-2"></i>Change Password
                                </button>
                                <button type="button" class="auth-btn auth-btn-outline-secondary" id="cancelPassword">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alert Container -->
        <div id="profile-alert-container" class="mt-4"></div>
    </div>
</div>
