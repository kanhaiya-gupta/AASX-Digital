<!-- Query Interface Component -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-primary text-white">
        <h5 class="mb-0">
            <i class="fas fa-search me-2"></i>
            AI Analysis Query
        </h5>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <label for="query-input" class="form-label fw-bold">
                <i class="fas fa-question-circle text-primary me-1"></i>
                Your Question
            </label>
            <textarea 
                class="form-control query-input" 
                id="query-input" 
                rows="4" 
                placeholder="Ask about asset quality, risk assessment, optimization opportunities, AASX structure analysis, or general insights from your digital twin data..."
            ></textarea>
        </div>
        
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <button type="button" class="btn btn-primary btn-lg" id="submit-query">
                    <i class="fas fa-paper-plane me-2"></i>
                    Analyze with AI
                </button>
                <button type="button" class="btn btn-outline-secondary ms-2" id="clear-query">
                    <i class="fas fa-eraser me-1"></i>
                    Clear
                </button>
                <button type="button" class="btn btn-outline-info ms-2" id="get-recommendations">
                    <i class="fas fa-lightbulb me-1"></i>
                    Get Recommendations
                </button>
            </div>
            <div class="text-end">
                <small class="text-muted">
                    <i class="fas fa-lightbulb me-1"></i>
                    Try demo queries for quick insights
                </small>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div class="loading-spinner text-center mt-3" id="query-loading" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">AI is analyzing your question...</p>
        </div>
    </div>
</div>

<!-- Analysis Results Component -->
<div class="card border-0 shadow-sm" id="response-section" style="display: none;">
    <div class="card-header bg-gradient-success text-white">
        <h5 class="mb-0">
            <i class="fas fa-lightbulb me-2"></i>
            AI Analysis Results
        </h5>
    </div>
    <div class="card-body" id="response-content">
        <!-- Results will be populated here -->
    </div>
</div>

<!-- Technique Comparison Results Component -->
<div class="card border-0 shadow-sm mt-4" id="comparison-section" style="display: none;">
    <div class="card-header bg-gradient-warning text-white">
        <h5 class="mb-0">
            <i class="fas fa-balance-scale me-2"></i>
            Technique Comparison
        </h5>
    </div>
    <div class="card-body" id="comparison-content">
        <!-- Comparison results will be populated here -->
    </div>
</div>
