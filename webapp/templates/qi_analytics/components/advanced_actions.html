<!-- Advanced Analytics Actions Component -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card shadow">
            <div class="card-header py-3 bg-gradient-info text-white">
                <h6 class="m-0 font-weight-bold">
                    <i class="fas fa-cogs me-2"></i>
                    Advanced Analytics Actions
                </h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <button class="btn btn-outline-primary w-100" onclick="generateAnalyticsReport()">
                            <i class="fas fa-file-alt me-2"></i>
                            Generate Report
                        </button>
                    </div>
                    <div class="col-md-3 mb-3">
                        <button class="btn btn-outline-success w-100" onclick="exportAnalyticsData()">
                            <i class="fas fa-download me-2"></i>
                            Export Data
                        </button>
                    </div>
                    <div class="col-md-3 mb-3">
                        <button class="btn btn-outline-info w-100" onclick="compareTwinAnalytics()">
                            <i class="fas fa-balance-scale me-2"></i>
                            Compare Twins
                        </button>
                    </div>
                    <div class="col-md-3 mb-3">
                        <button class="btn btn-outline-warning w-100" onclick="predictiveAnalytics()">
                            <i class="fas fa-crystal-ball me-2"></i>
                            Predictive Analysis
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
