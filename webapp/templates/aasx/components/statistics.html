<!-- Statistics Dashboard -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-folder fa-3x text-primary"></i>
                </div>
                <h3 class="fw-bold text-primary mb-1" id="totalProjects">0</h3>
                <p class="text-muted mb-0">Active Projects</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-file-archive fa-3x text-info"></i>
                </div>
                <h3 class="fw-bold text-info mb-1" id="totalFiles">0</h3>
                <p class="text-muted mb-0">AASX Files</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-check-circle fa-3x text-success"></i>
                </div>
                <h3 class="fw-bold text-success mb-1" id="processedFiles">0</h3>
                <p class="text-muted mb-0">Processed</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-database fa-3x text-warning"></i>
                </div>
                <h3 class="fw-bold text-warning mb-1" id="totalSize">0 MB</h3>
                <p class="text-muted mb-0">Total Size</p>
            </div>
        </div>
    </div>
</div>
