<!-- ETL Pipeline Management -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-warning text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="fas fa-cogs me-2"></i>
            ETL Pipeline Management
        </h5>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-light btn-sm" id="runSelectedPipeline">
                <i class="fas fa-play me-1"></i>
                Run Selected Pipeline
            </button>
            <button type="button" class="btn btn-light btn-sm" id="runAllData">
                <i class="fas fa-rocket me-1"></i>
                Run ETL on All Data
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-8">
                <div class="card bg-light border-0">
                    <div class="card-body">
                        <h6 class="text-primary mb-3">
                            <i class="fas fa-list me-2"></i>
                            Project Files
                        </h6>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label fw-bold mb-0">Select Use Case:</label>
                                <button type="button" class="btn btn-sm btn-outline-primary" id="refreshEtlFiles">
                                    <i class="fas fa-sync-alt me-1"></i>
                                    Refresh Files
                                </button>
                            </div>
                            <select class="form-select mb-2" id="etlUseCaseSelect">
                                <option value="">Choose a use case...</option>
                                <option value="thermal">🔥 Thermal Analysis</option>
                                <option value="structural">🏗️ Structural Analysis</option>
                                <option value="fluid_dynamics">💧 Fluid Dynamics</option>
                                <option value="multi_physics">🔗 Multi-Physics</option>
                                <option value="industrial">🏭 Industrial Applications</option>
                                <option value="other">🔬 Other Projects Analysis</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold mb-0">Select Project:</label>
                            <select class="form-select" id="etlProjectSelect" disabled>
                                <option value="">Choose a project...</option>
                            </select>
                            <small class="form-text text-muted">Select a use case first to see available projects</small>
                        </div>
                        <div id="etlFilesList">
                            <div class="text-center text-muted py-4">
                                <i class="fas fa-file-alt fa-3x mb-3 text-muted"></i>
                                <h5>No Files Available</h5>
                                <p>Select a project to view available files for ETL processing</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-light border-0">
                    <div class="card-body">
                        <h6 class="text-primary mb-3">
                            <i class="fas fa-cog me-2"></i>
                            ETL Configuration
                        </h6>
                        <form id="etlConfigForm">
                            <!-- Extract Configuration -->
                            <h6 class="text-success mb-2">
                                <i class="fas fa-download me-1"></i>Extract Configuration
                            </h6>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="hybridProcessing" checked>
                                    <label class="form-check-label" for="hybridProcessing">
                                        Hybrid Processing
                                    </label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="parallelProcessing" checked>
                                    <label class="form-check-label" for="parallelProcessing">
                                        Parallel Processing
                                    </label>
                                </div>
                            </div>
                            
                            <!-- Transform Configuration -->
                            <h6 class="text-info mb-2">
                                <i class="fas fa-exchange-alt me-1"></i>Transform Configuration
                            </h6>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="dataValidation" checked>
                                    <label class="form-check-label" for="dataValidation">
                                        Data Validation
                                    </label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="dataCleaning" checked>
                                    <label class="form-check-label" for="dataCleaning">
                                        Data Cleaning
                                    </label>
                                </div>
                            </div>
                            
                            <!-- Load Configuration -->
                            <h6 class="text-warning mb-2">
                                <i class="fas fa-upload me-1"></i>Load Configuration
                            </h6>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="sqliteExport" checked>
                                    <label class="form-check-label" for="sqliteExport">
                                        SQLite Export
                                    </label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="vectorExport" checked>
                                    <label class="form-check-label" for="vectorExport">
                                        Vector DB Export
                                    </label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="jsonExport" checked>
                                    <label class="form-check-label" for="jsonExport">
                                        JSON Export
                                    </label>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
