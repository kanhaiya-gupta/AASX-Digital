<!-- Data Management Panel -->
<div class="aasx-data-management-card card border-0 shadow-sm mb-4">
    <div class="aasx-card-header card-header bg-gradient-info text-white">
        <h5 class="aasx-card-title mb-0">
            <i class="fas fa-folder me-2"></i>
            Data Management
        </h5>
    </div>
    <div class="aasx-card-body card-body">
        <!-- Use Cases Section -->
        <div class="aasx-use-cases-section row mb-4">
            <div class="col-12">
                <h6 class="aasx-section-title text-primary mb-3">
                    <i class="fas fa-sitemap me-2"></i>
                    Use Cases
                </h6>
                <div id="useCasesContainer" class="aasx-use-cases-container">
                    <div class="aasx-loading-state text-center text-muted py-4">
                        <i class="fas fa-sitemap fa-3x mb-3 text-muted"></i>
                        <h5>Loading Use Cases...</h5>
                        <p>Please wait while we load the use cases</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Projects Section (Hidden by default) -->
        <div class="aasx-projects-section row mb-3" id="projectsSection" style="display: none;">
            <div class="col-12">
                <div class="aasx-projects-header d-flex justify-content-between align-items-center mb-3">
                    <h6 class="aasx-projects-title text-success mb-0">
                        <i class="fas fa-folder me-2"></i>
                        Projects in: <span id="selectedUseCaseName" class="fw-bold"></span>
                    </h6>
                    <button class="aasx-btn aasx-btn-back btn btn-sm btn-outline-secondary" id="backToUseCases">
                        <i class="fas fa-arrow-left me-1"></i>Back to Use Cases
                    </button>
                </div>
                <div id="projectsContainer" class="aasx-projects-container">
                    <div class="aasx-empty-state text-center text-muted py-4">
                        <i class="fas fa-folder-open fa-3x mb-3 text-muted"></i>
                        <h5>No Projects Found</h5>
                        <p>This use case has no projects yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
