<!-- System Status Dashboard -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-gradient-primary text-white">
                <h5 class="mb-0">
                    <i class="fas fa-tachometer-alt me-2"></i>
                    System Status Dashboard
                </h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-etl">
                                <i class="fas fa-cogs fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">ETL Pipeline</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-qdrant">
                                <i class="fas fa-database fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Vector DB</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-neo4j">
                                <i class="fas fa-project-diagram fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Knowledge Graph</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-system">
                                <i class="fas fa-server fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">System</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-storage">
                                <i class="fas fa-hdd fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Storage</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-processing">
                                <i class="fas fa-microchip fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Processing</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
