<!-- Simulation Progress Tracker -->
<div class="pm-progress-tracker-card card border-0 shadow-sm mb-4">
    <div class="pm-card-header card-header bg-gradient-info text-white">
        <h5 class="pm-card-title mb-0">
            <i class="fas fa-tachometer-alt me-2"></i>
            Simulation Progress Tracker
        </h5>
    </div>
    <div class="pm-card-body card-body">
        <!-- Progress Overview -->
        <div class="pm-progress-overview row mb-3">
            <div class="col-md-3">
                <div class="pm-progress-item text-center">
                    <div class="pm-progress-value h4 text-primary mb-1" id="progress-percentage">0%</div>
                    <small class="pm-progress-label text-muted">Progress</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="pm-progress-item text-center">
                    <div class="pm-progress-value h4 text-success mb-1" id="elapsed-time">00:00:00</div>
                    <small class="pm-progress-label text-muted">Elapsed Time</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="pm-progress-item text-center">
                    <div class="pm-progress-value h4 text-warning mb-1" id="estimated-remaining">--:--:--</div>
                    <small class="pm-progress-label text-muted">Estimated Remaining</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="pm-progress-item text-center">
                    <div class="pm-progress-value h4 text-info mb-1" id="current-iteration">0</div>
                    <small class="pm-progress-label text-muted">Current Iteration</small>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="pm-progress-bar-section mb-3">
            <div class="pm-progress-header d-flex justify-content-between mb-1">
                <span class="pm-progress-title small text-muted">Simulation Progress</span>
                <span class="pm-progress-status small text-muted" id="progress-text">Initializing...</span>
            </div>
            <div class="pm-progress-bar-container progress">
                <div class="pm-progress-bar progress-bar progress-bar-striped progress-bar-animated" 
                     id="simulation-progress-bar" 
                     role="progressbar" 
                     aria-valuenow="0" 
                     aria-valuemin="0" 
                     aria-valuemax="100">
                    0%
                </div>
            </div>
        </div>

        <!-- Performance Metrics -->
        <div class="pm-performance-metrics-card card bg-light border-0 mb-3">
            <div class="pm-card-header card-header bg-secondary text-white">
                <h6 class="pm-card-title mb-0">
                    <i class="fas fa-chart-line me-1"></i>
                    Performance Metrics
                </h6>
            </div>
            <div class="pm-card-body card-body">
                <div class="pm-metrics-grid row">
                    <div class="col-md-3">
                        <label class="pm-metric-label form-label small">CPU Usage</label>
                        <div class="pm-metric-progress progress mb-2">
                            <div class="pm-metric-bar progress-bar bg-success" id="cpu-usage-bar"></div>
                        </div>
                        <small class="pm-metric-value text-muted" id="cpu-usage-text">0%</small>
                    </div>
                    <div class="col-md-3">
                        <label class="pm-metric-label form-label small">Memory Usage</label>
                        <div class="pm-metric-progress progress mb-2">
                            <div class="pm-metric-bar progress-bar bg-info" id="memory-usage-bar"></div>
                        </div>
                        <small class="pm-metric-value text-muted" id="memory-usage-text">0 MB</small>
                    </div>
                    <div class="col-md-3">
                        <label class="pm-metric-label form-label small">Convergence</label>
                        <div class="pm-metric-progress progress mb-2">
                            <div class="pm-metric-bar progress-bar bg-warning" id="convergence-bar"></div>
                        </div>
                        <small class="pm-metric-value text-muted" id="convergence-text">1e-6</small>
                    </div>
                    <div class="col-md-3">
                        <label class="pm-metric-label form-label small">Speed (iter/s)</label>
                        <div class="pm-speed-value h6 text-primary mb-0" id="iteration-speed">0.0</div>
                        <small class="pm-speed-label text-muted">Iterations per second</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status and Logs -->
        <div class="pm-status-logs row">
            <div class="col-md-6">
                <h6 class="pm-status-title mb-2">Simulation Status</h6>
                <div class="pm-status-alert alert alert-info" id="simulation-status">
                    <i class="fas fa-info-circle me-1"></i>
                    Ready to start simulation
                </div>
            </div>
            <div class="col-md-6">
                <h6 class="pm-logs-title mb-2">Recent Logs</h6>
                <div class="pm-logs-container bg-dark text-light p-2 rounded" style="height: 100px; overflow-y: auto; font-family: monospace; font-size: 0.8rem;" id="simulation-logs">
                    <div class="text-muted">No logs available</div>
                </div>
            </div>
        </div>
    </div>
</div>
