<!-- 3D Viewer Component -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-primary text-white">
        <h5 class="mb-0">
            <i class="fas fa-cube me-2"></i>
            3D Model Viewer
        </h5>
    </div>
    <div class="card-body">
        <!-- 3D Viewer Controls -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label fw-bold">View Mode</label>
                <select class="form-select" id="view-mode-select">
                    <option value="solid">Solid</option>
                    <option value="wireframe">Wireframe</option>
                    <option value="transparent">Transparent</option>
                    <option value="contour">Contour</option>
                    <option value="vector">Vector Field</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Display Variable</label>
                <select class="form-select" id="display-variable">
                    <option value="geometry">Geometry Only</option>
                    <option value="temperature">Temperature</option>
                    <option value="pressure">Pressure</option>
                    <option value="velocity">Velocity</option>
                    <option value="stress">Stress</option>
                    <option value="displacement">Displacement</option>
                    <option value="strain">Strain</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Color Scale</label>
                <select class="form-select" id="3d-color-scale">
                    <option value="viridis">Viridis</option>
                    <option value="plasma">Plasma</option>
                    <option value="inferno">Inferno</option>
                    <option value="magma">Magma</option>
                    <option value="coolwarm">Cool-Warm</option>
                    <option value="rainbow">Rainbow</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Time Step</label>
                <input type="range" class="form-range" id="3d-time-slider" min="0" max="100" value="0">
                <small class="text-muted">Time: <span id="3d-time-display">0.0s</span></small>
            </div>
        </div>

        <!-- 3D Viewer Options -->
        <div class="card bg-light border-0 mb-3">
            <div class="card-header bg-info text-white">
                <h6 class="mb-0">
                    <i class="fas fa-cog me-1"></i>
                    3D Viewer Options
                </h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label class="form-label small">Show Mesh</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="show-3d-mesh" checked>
                            <label class="form-check-label" for="show-3d-mesh">Display mesh</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Show Boundaries</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="show-3d-boundaries" checked>
                            <label class="form-check-label" for="show-3d-boundaries">Display boundaries</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Show Vectors</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="show-3d-vectors">
                            <label class="form-check-label" for="show-3d-vectors">Display vectors</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Auto Rotate</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="auto-rotate-3d">
                            <label class="form-check-label" for="auto-rotate-3d">Auto rotate</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3D Viewer Container -->
        <div class="3d-viewer-container" style="height: 500px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative;">
            <div class="text-center text-light">
                <i class="fas fa-cube fa-3x mb-3"></i>
                <p>3D Viewer Loading...</p>
                <small>Select a model and variable to view 3D visualization</small>
            </div>
            
            <!-- 3D Viewer Controls Overlay -->
            <div class="position-absolute top-0 end-0 m-2">
                <div class="btn-group-vertical">
                    <button class="btn btn-sm btn-outline-light" id="reset-3d-view" title="Reset View">
                        <i class="fas fa-home"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-light" id="zoom-in-3d" title="Zoom In">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-light" id="zoom-out-3d" title="Zoom Out">
                        <i class="fas fa-minus"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 3D Viewer Actions -->
        <div class="d-flex gap-2 mt-3">
            <button type="button" class="btn btn-outline-primary btn-sm" id="update-3d-view-btn">
                <i class="fas fa-sync me-1"></i>Update View
            </button>
            <button type="button" class="btn btn-outline-success btn-sm" id="export-3d-model-btn">
                <i class="fas fa-download me-1"></i>Export Model
            </button>
            <button type="button" class="btn btn-outline-info btn-sm" id="screenshot-3d-btn">
                <i class="fas fa-camera me-1"></i>Screenshot
            </button>
            <button type="button" class="btn btn-outline-warning btn-sm" id="reset-3d-camera-btn">
                <i class="fas fa-undo me-1"></i>Reset Camera
            </button>
        </div>
    </div>
</div>
