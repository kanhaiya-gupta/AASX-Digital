<!-- Charts Visualization Component -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-warning text-white">
        <h5 class="mb-0">
            <i class="fas fa-chart-line me-2"></i>
            2D Charts & Analytics
        </h5>
    </div>
    <div class="card-body">
        <!-- Chart Controls -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label fw-bold">Chart Type</label>
                <select class="form-select" id="chart-type-select">
                    <option value="line">Line Chart</option>
                    <option value="scatter">Scatter Plot</option>
                    <option value="contour">Contour Plot</option>
                    <option value="heatmap">Heatmap</option>
                    <option value="bar">Bar Chart</option>
                    <option value="histogram">Histogram</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">X-Axis Variable</label>
                <select class="form-select" id="x-axis-variable">
                    <option value="time">Time</option>
                    <option value="position">Position</option>
                    <option value="temperature">Temperature</option>
                    <option value="pressure">Pressure</option>
                    <option value="velocity">Velocity</option>
                    <option value="iteration">Iteration</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Y-Axis Variable</label>
                <select class="form-select" id="y-axis-variable">
                    <option value="temperature">Temperature</option>
                    <option value="pressure">Pressure</option>
                    <option value="velocity">Velocity</option>
                    <option value="stress">Stress</option>
                    <option value="displacement">Displacement</option>
                    <option value="convergence">Convergence</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Color Variable</label>
                <select class="form-select" id="color-variable">
                    <option value="none">None</option>
                    <option value="temperature">Temperature</option>
                    <option value="pressure">Pressure</option>
                    <option value="velocity">Velocity</option>
                    <option value="stress">Stress</option>
                </select>
            </div>
        </div>

        <!-- Chart Options -->
        <div class="card bg-light border-0 mb-3">
            <div class="card-header bg-info text-white">
                <h6 class="mb-0">
                    <i class="fas fa-cog me-1"></i>
                    Chart Options
                </h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label class="form-label small">Show Grid</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="show-grid" checked>
                            <label class="form-check-label" for="show-grid">Display grid</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Show Legend</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="show-legend" checked>
                            <label class="form-check-label" for="show-legend">Display legend</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Auto Scale</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="auto-scale-chart" checked>
                            <label class="form-check-label" for="auto-scale-chart">Auto scale axes</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Real-time Update</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="real-time-update">
                            <label class="form-check-label" for="real-time-update">Live updates</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Container -->
        <div class="chart-container" style="height: 400px; background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
            <div class="text-center text-muted">
                <i class="fas fa-chart-area fa-3x mb-3"></i>
                <p>Select variables to display chart</p>
                <small>Choose X and Y axis variables to visualize your data</small>
            </div>
        </div>

        <!-- Chart Actions -->
        <div class="d-flex gap-2 mt-3">
            <button type="button" class="btn btn-outline-primary btn-sm" id="update-chart-btn">
                <i class="fas fa-sync me-1"></i>Update Chart
            </button>
            <button type="button" class="btn btn-outline-success btn-sm" id="export-chart-btn">
                <i class="fas fa-download me-1"></i>Export Chart
            </button>
            <button type="button" class="btn btn-outline-info btn-sm" id="save-chart-config-btn">
                <i class="fas fa-save me-1"></i>Save Configuration
            </button>
            <button type="button" class="btn btn-outline-warning btn-sm" id="reset-chart-btn">
                <i class="fas fa-undo me-1"></i>Reset
            </button>
        </div>
    </div>
</div>
