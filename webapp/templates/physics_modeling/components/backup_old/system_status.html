<!-- System Status Dashboard -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-gradient-primary text-white">
                <h5 class="mb-0">
                    <i class="fas fa-tachometer-alt me-2"></i>
                    System Status Dashboard
                </h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-physics-framework">
                                <i class="fas fa-atom fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Physics Framework</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-twin-connector">
                                <i class="fas fa-link fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Twin Connector</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-ai-rag">
                                <i class="fas fa-brain fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">AI/RAG Integration</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-models">
                                <i class="fas fa-cube fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Available Models</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-simulations">
                                <i class="fas fa-play-circle fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Active Simulations</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator" id="status-validation">
                                <i class="fas fa-check-circle fa-2x text-muted"></i>
                            </div>
                            <small class="d-block mt-1">Model Validation</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
