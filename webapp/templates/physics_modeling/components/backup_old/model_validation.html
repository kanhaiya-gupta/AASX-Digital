<!-- Model Validation -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-info text-white">
        <h5 class="mb-0">
            <i class="fas fa-check-double me-2"></i>
            Model Validation
        </h5>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label fw-bold">Validation Data</label>
            <textarea class="form-control" id="validation-data" rows="3" 
                      placeholder="Paste experimental data in JSON format..."></textarea>
        </div>
        <button type="button" class="btn btn-info w-100" id="validate-model-btn">
            <i class="fas fa-check me-1"></i>Validate Model
        </button>
        
        <div id="validation-results" class="mt-3" style="display: none;">
            <!-- Validation results will be shown here -->
        </div>
    </div>
</div>
