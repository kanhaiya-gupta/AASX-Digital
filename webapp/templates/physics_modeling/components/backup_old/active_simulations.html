<!-- Active Simulations -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-danger text-white">
        <h5 class="mb-0">
            <i class="fas fa-running me-2"></i>
            Active Simulations
        </h5>
    </div>
    <div class="card-body">
        <div id="active-simulations">
            <!-- Sample Active Simulations -->
            <div class="simulation-card mb-3 p-3 border rounded">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-1">Thermal Analysis #1</h6>
                        <span class="badge bg-success">running</span>
                        <small class="d-block text-muted">Progress: 75%</small>
                    </div>
                    <div class="text-end">
                        <i class="fas fa-play-circle text-success"></i>
                        <small class="d-block text-success">active</small>
                    </div>
                </div>
                <div class="progress mt-2" style="height: 4px;">
                    <div class="progress-bar bg-success" style="width: 75%"></div>
                </div>
                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-warning">Pause</button>
                    <button class="btn btn-sm btn-outline-danger">Stop</button>
                </div>
            </div>
            
            <div class="simulation-card mb-3 p-3 border rounded">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-1">Structural Analysis #2</h6>
                        <span class="badge bg-warning">paused</span>
                        <small class="d-block text-muted">Progress: 45%</small>
                    </div>
                    <div class="text-end">
                        <i class="fas fa-pause-circle text-warning"></i>
                        <small class="d-block text-warning">paused</small>
                    </div>
                </div>
                <div class="progress mt-2" style="height: 4px;">
                    <div class="progress-bar bg-warning" style="width: 45%"></div>
                </div>
                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-success">Resume</button>
                    <button class="btn btn-sm btn-outline-danger">Stop</button>
                </div>
            </div>
        </div>
    </div>
</div>
