<!-- Model Creation Panel -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-info text-white">
        <h5 class="mb-0">
            <i class="fas fa-plus-circle me-2"></i>
            Create Advanced Physics Model
        </h5>
    </div>
    <div class="card-body">
        <form id="model-creation-form">
            <!-- Basic Configuration -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">
                        <i class="fas fa-link text-primary me-1"></i>Digital Twin
                    </label>
                    <div class="input-group">
                        <select class="form-select" id="twin-select" required>
                            <option value="">Select a digital twin...</option>
                        </select>
                        <button class="btn btn-outline-secondary" type="button" id="refresh-twins-btn" title="Refresh twin list">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <small class="text-muted">Select a digital twin from the registry to create a physics model</small>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">
                        <i class="fas fa-atom text-success me-1"></i>Physics Type
                    </label>
                    <select class="form-select" id="physics-type-select" required>
                        <option value="">Select physics type...</option>
                        <option value="thermal">Thermal Analysis</option>
                        <option value="structural">Structural Analysis</option>
                        <option value="fluid">Fluid Dynamics</option>
                        <option value="electromagnetic">Electromagnetic</option>
                        <option value="multi_physics">Multi-Physics</option>
                    </select>
                </div>
            </div>

            <!-- Model Configuration -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">
                        <i class="fas fa-cog text-warning me-1"></i>Solver Settings
                    </label>
                    <select class="form-select" id="solver-select">
                        <option value="fenics">FEniCS (FEA)</option>
                        <option value="openfoam">OpenFOAM (CFD)</option>
                        <option value="sfepy">SfePy (FEA)</option>
                        <option value="custom">Custom Solver</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">
                        <i class="fas fa-brain text-info me-1"></i>AI Integration
                    </label>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="ai-insights-toggle" checked>
                        <label class="form-check-label" for="ai-insights-toggle">
                            Use AI insights for model parameters
                        </label>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">
                        <i class="fas fa-layer-group text-secondary me-1"></i>Model Complexity
                    </label>
                    <select class="form-select" id="model-complexity">
                        <option value="basic">Basic (Single Physics)</option>
                        <option value="advanced">Advanced (Multi-Physics)</option>
                        <option value="expert">Expert (Coupled Systems)</option>
                    </select>
                </div>
            </div>

            <!-- Material Properties Section -->
            <div class="card bg-light border-0 mb-3">
                <div class="card-header bg-primary text-white">
                    <h6 class="mb-0">
                        <i class="fas fa-cube me-1"></i>
                        Material Properties Configuration
                    </h6>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Material Library</label>
                            <select class="form-select" id="material-library-select">
                                <option value="">Select from library...</option>
                                <option value="steel">Steel (Structural)</option>
                                <option value="aluminum">Aluminum (Lightweight)</option>
                                <option value="copper">Copper (Thermal)</option>
                                <option value="composite">Composite (Advanced)</option>
                                <option value="ceramic">Ceramic (High-Temp)</option>
                                <option value="polymer">Polymer (Flexible)</option>
                                <option value="custom">Custom Material</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Material Count</label>
                            <select class="form-select" id="material-count">
                                <option value="1">Single Material</option>
                                <option value="2">Dual Material</option>
                                <option value="3">Multi-Material</option>
                                <option value="gradient">Gradient Material</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Material Properties Grid -->
                    <div id="material-properties-grid">
                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label">Basic Properties</label>
                                <div class="mb-2">
                                    <label class="form-label small">Density (kg/m³)</label>
                                    <input type="number" class="form-control form-control-sm" id="density" value="7850">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Young's Modulus (GPa)</label>
                                    <input type="number" class="form-control form-control-sm" id="youngs-modulus" value="200">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Poisson's Ratio</label>
                                    <input type="number" class="form-control form-control-sm" id="poissons-ratio" value="0.3" step="0.01" min="0" max="0.5">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Thermal Properties</label>
                                <div class="mb-2">
                                    <label class="form-label small">Thermal Conductivity (W/m·K)</label>
                                    <input type="number" class="form-control form-control-sm" id="thermal-conductivity" value="50">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Specific Heat (J/kg·K)</label>
                                    <input type="number" class="form-control form-control-sm" id="specific-heat" value="460">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Thermal Expansion (1/K)</label>
                                    <input type="number" class="form-control form-control-sm" id="thermal-expansion" value="12e-6">
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <button type="button" class="btn btn-outline-primary btn-sm" id="toggle-advanced-properties">
                                <i class="fas fa-plus me-1"></i>Show Advanced Properties
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm ms-2" id="load-material-template">
                                <i class="fas fa-download me-1"></i>Load Material Template
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Boundary Conditions Section -->
            <div class="card bg-light border-0 mb-3">
                <div class="card-header bg-success text-white">
                    <h6 class="mb-0">
                        <i class="fas fa-border-all me-1"></i>
                        Boundary Conditions Configuration
                    </h6>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Boundary Condition Templates</label>
                            <select class="form-select" id="bc-template-select">
                                <option value="">Select template...</option>
                                <option value="thermal_radiation">Thermal Radiation</option>
                                <option value="thermal_convection">Thermal Convection</option>
                                <option value="structural_fixed">Structural Fixed Support</option>
                                <option value="structural_pressure">Structural Pressure Load</option>
                                <option value="fluid_inlet">Fluid Inlet</option>
                                <option value="fluid_outlet">Fluid Outlet</option>
                                <option value="fluid_wall">Fluid Wall</option>
                                <option value="electromagnetic_current">Electromagnetic Current</option>
                                <option value="multi_physics_coupling">Multi-Physics Coupling</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Boundary Type</label>
                            <select class="form-select" id="boundary-type-select">
                                <option value="dirichlet">Dirichlet (Fixed Value)</option>
                                <option value="neumann">Neumann (Gradient/Flux)</option>
                                <option value="robin">Robin (Mixed)</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Boundary Conditions Grid -->
                    <div id="boundary-conditions-grid">
                        <div class="row">
                            <div class="col-md-4">
                                <label class="form-label">Thermal BCs</label>
                                <div class="mb-2">
                                    <label class="form-label small">Temperature (°C)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-temperature" value="25">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Heat Flux (W/m²)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-heat-flux" value="1000">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Convection Coefficient (W/m²·K)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-convection-coeff" value="10">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Structural BCs</label>
                                <div class="mb-2">
                                    <label class="form-label small">Displacement (mm)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-displacement" value="0">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Force (N)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-force" value="1000">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Pressure (Pa)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-pressure" value="101325">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Fluid BCs</label>
                                <div class="mb-2">
                                    <label class="form-label small">Velocity (m/s)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-velocity" value="1">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Turbulence Intensity (%)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-turbulence" value="5">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small">Viscosity (Pa·s)</label>
                                    <input type="number" class="form-control form-control-sm" id="bc-viscosity" value="1e-3">
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <button type="button" class="btn btn-outline-success btn-sm" id="add-boundary-condition">
                                <i class="fas fa-plus me-1"></i>Add Boundary Condition
                            </button>
                            <button type="button" class="btn btn-outline-info btn-sm ms-2" id="load-bc-template">
                                <i class="fas fa-download me-1"></i>Load BC Template
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Geometry and Mesh Configuration -->
            <div class="card bg-light border-0 mb-3">
                <div class="card-header bg-warning text-dark">
                    <h6 class="mb-0">
                        <i class="fas fa-shapes me-1"></i>
                        Geometry & Mesh Configuration
                    </h6>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Geometry Type</label>
                            <select class="form-select" id="geometry-type">
                                <option value="2d">2D Geometry</option>
                                <option value="3d">3D Geometry</option>
                                <option value="axisymmetric">Axisymmetric</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Mesh Quality</label>
                            <select class="form-select" id="mesh-quality">
                                <option value="coarse">Coarse (Fast)</option>
                                <option value="medium">Medium (Balanced)</option>
                                <option value="fine">Fine (Accurate)</option>
                                <option value="very_fine">Very Fine (High Accuracy)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Element Type</label>
                            <select class="form-select" id="element-type">
                                <option value="tetrahedral">Tetrahedral</option>
                                <option value="hexahedral">Hexahedral</option>
                                <option value="triangular">Triangular (2D)</option>
                                <option value="quadrilateral">Quadrilateral (2D)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus me-1"></i>Create Model
                </button>
                <button type="button" class="btn btn-outline-secondary" id="load-template-btn">
                    <i class="fas fa-download me-1"></i>Load Template
                </button>
                <button type="button" class="btn btn-outline-info" id="validate-config-btn">
                    <i class="fas fa-check me-1"></i>Validate Config
                </button>
                <button type="button" class="btn btn-outline-warning" id="preview-model-btn">
                    <i class="fas fa-eye me-1"></i>Preview Model
                </button>
            </div>
        </form>
    </div>
</div>
