<!-- Available Models -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-gradient-secondary text-white">
        <h5 class="mb-0">
            <i class="fas fa-cubes me-2"></i>
            Available Models
        </h5>
    </div>
    <div class="card-body">
        <div id="models-list">
            <!-- Sample Models -->
            <div class="model-card mb-3 p-3 border rounded">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-1">Motor Thermal Model</h6>
                        <span class="badge bg-primary">thermal</span>
                        <small class="d-block text-muted">15/01/2025</small>
                    </div>
                    <div class="text-end">
                        <i class="fas fa-check text-success"></i>
                        <small class="d-block text-success">ready</small>
                    </div>
                </div>
                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-primary">View</button>
                    <button class="btn btn-sm btn-outline-success">Run</button>
                </div>
            </div>
            
            <div class="model-card mb-3 p-3 border rounded">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-1">Pump Structural Model</h6>
                        <span class="badge bg-warning">structural</span>
                        <small class="d-block text-muted">14/01/2025</small>
                    </div>
                    <div class="text-end">
                        <i class="fas fa-check text-success"></i>
                        <small class="d-block text-success">ready</small>
                    </div>
                </div>
                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-primary">View</button>
                    <button class="btn btn-sm btn-outline-success">Run</button>
                </div>
            </div>
            
            <div class="model-card mb-3 p-3 border rounded">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-1">Valve Flow Model</h6>
                        <span class="badge bg-info">fluid</span>
                        <small class="d-block text-muted">13/01/2025</small>
                    </div>
                    <div class="text-end">
                        <i class="fas fa-spinner fa-spin text-warning"></i>
                        <small class="d-block text-warning">training</small>
                    </div>
                </div>
                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-primary">View</button>
                    <button class="btn btn-sm btn-outline-secondary" disabled>Run</button>
                </div>
            </div>
        </div>
    </div>
</div>
