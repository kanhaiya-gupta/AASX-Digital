<!-- Use Cases Showcase -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-gradient-primary text-white">
                <h5 class="mb-0">
                    <i class="fas fa-rocket me-2"></i>
                    Real-World Use Cases & Industry Templates
                </h5>
            </div>
            <div class="card-body">
                <!-- Use Case Categories Tabs -->
                <ul class="nav nav-tabs" id="useCaseTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="thermal-tab" data-bs-toggle="tab" data-bs-target="#thermal" type="button" role="tab">
                            <i class="fas fa-fire me-1"></i>Thermal Analysis
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="structural-tab" data-bs-toggle="tab" data-bs-target="#structural" type="button" role="tab">
                            <i class="fas fa-cube me-1"></i>Structural Analysis
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="fluid-tab" data-bs-toggle="tab" data-bs-target="#fluid" type="button" role="tab">
                            <i class="fas fa-water me-1"></i>Fluid Dynamics
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="multi-tab" data-bs-toggle="tab" data-bs-target="#multi" type="button" role="tab">
                            <i class="fas fa-link me-1"></i>Multi-Physics
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="industrial-tab" data-bs-toggle="tab" data-bs-target="#industrial" type="button" role="tab">
                            <i class="fas fa-industry me-1"></i>Industrial Applications
                        </button>
                    </li>
                </ul>

                <!-- Use Case Content -->
                <div class="tab-content mt-3" id="useCaseTabContent">
                    <!-- Thermal Analysis Use Cases -->
                    <div class="tab-pane fade show active" id="thermal" role="tabpanel">
                        <div class="row" id="thermal-use-cases">
                            <!-- Thermal use cases will be loaded here -->
                        </div>
                    </div>

                    <!-- Structural Analysis Use Cases -->
                    <div class="tab-pane fade" id="structural" role="tabpanel">
                        <div class="row" id="structural-use-cases">
                            <!-- Structural use cases will be loaded here -->
                        </div>
                    </div>

                    <!-- Fluid Dynamics Use Cases -->
                    <div class="tab-pane fade" id="fluid" role="tabpanel">
                        <div class="row" id="fluid-use-cases">
                            <!-- Fluid use cases will be loaded here -->
                        </div>
                    </div>

                    <!-- Multi-Physics Use Cases -->
                    <div class="tab-pane fade" id="multi" role="tabpanel">
                        <div class="row" id="multi-use-cases">
                            <!-- Multi-physics use cases will be loaded here -->
                        </div>
                    </div>

                    <!-- Industrial Applications Use Cases -->
                    <div class="tab-pane fade" id="industrial" role="tabpanel">
                        <div class="row" id="industrial-use-cases">
                            <!-- Industrial use cases will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="d-flex gap-2 flex-wrap">
                            <button type="button" class="btn btn-outline-primary" id="load-all-use-cases-btn">
                                <i class="fas fa-download me-1"></i>Load All Use Cases
                            </button>
                            <button type="button" class="btn btn-outline-success" id="famous-examples-btn">
                                <i class="fas fa-star me-1"></i>View Famous Examples
                            </button>
                            <button type="button" class="btn btn-outline-info" id="optimization-targets-btn">
                                <i class="fas fa-bullseye me-1"></i>Optimization Targets
                            </button>
                            <button type="button" class="btn btn-outline-warning" id="hydrogen-economy-btn">
                                <i class="fas fa-leaf me-1"></i>Hydrogen Economy
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
