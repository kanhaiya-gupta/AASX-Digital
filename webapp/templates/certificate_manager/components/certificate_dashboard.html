<!-- Certificate Dashboard Component -->
<div class="cm-certificate-dashboard certificate-dashboard">
    <!-- Dashboard Stats -->
    <div class="cm-dashboard-stats dashboard-stats">
        <div class="row">
            <div class="col-md-3">
                <div class="cm-stat-card stat-card">
                    <div class="cm-stat-icon stat-icon">
                        <i class="fas fa-certificate"></i>
                    </div>
                    <div class="cm-stat-content stat-content">
                        <div class="cm-stat-number stat-number" id="dashboard-total">0</div>
                        <div class="cm-stat-label stat-label">Total Certificates</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="cm-stat-card stat-card">
                    <div class="cm-stat-icon stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="cm-stat-content stat-content">
                        <div class="cm-stat-number stat-number" id="dashboard-active">0</div>
                        <div class="cm-stat-label stat-label">Active</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="cm-stat-card stat-card">
                    <div class="cm-stat-icon stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="cm-stat-content stat-content">
                        <div class="cm-stat-number stat-number" id="dashboard-pending">0</div>
                        <div class="cm-stat-label stat-label">Pending</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="cm-stat-card stat-card">
                    <div class="cm-stat-icon stat-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="cm-stat-content stat-content">
                        <div class="cm-stat-number stat-number" id="dashboard-verified">0</div>
                        <div class="cm-stat-label stat-label">Verified</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="cm-recent-activity recent-activity">
        <div class="cm-card card">
            <div class="cm-card-header card-header">
                <h5 class="cm-card-title"><i class="fas fa-history"></i> Recent Activity</h5>
            </div>
            <div class="cm-card-body card-body">
                <div class="cm-activity-list activity-list" id="activity-list">
                    <!-- Activity items will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="cm-quick-actions quick-actions">
        <div class="cm-card card">
            <div class="cm-card-header card-header">
                <h5 class="cm-card-title"><i class="fas fa-bolt"></i> Quick Actions</h5>
            </div>
            <div class="cm-card-body card-body">
                <div class="row">
                    <div class="col-md-6">
                        <button class="cm-btn cm-btn-create btn btn-primary btn-block mb-2" onclick="createNewCertificate()">
                            <i class="fas fa-plus"></i> Create Certificate
                        </button>
                        <button class="cm-btn cm-btn-bulk-export btn btn-success btn-block mb-2" onclick="bulkExport()">
                            <i class="fas fa-download"></i> Bulk Export
                        </button>
                    </div>
                    <div class="col-md-6">
                        <button class="cm-btn cm-btn-view-all btn btn-info btn-block mb-2" onclick="viewAllCertificates()">
                            <i class="fas fa-list"></i> View All
                        </button>
                        <button class="cm-btn cm-btn-validate-all btn btn-warning btn-block mb-2" onclick="validateAll()">
                            <i class="fas fa-shield-alt"></i> Validate All
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Certificate Health -->
    <div class="cm-certificate-health certificate-health">
        <div class="cm-card card">
            <div class="cm-card-header card-header">
                <h5 class="cm-card-title"><i class="fas fa-heartbeat"></i> Certificate Health</h5>
            </div>
            <div class="cm-card-body card-body">
                <div class="health-indicators">
                    <div class="health-item">
                        <div class="health-label">Overall Health</div>
                        <div class="health-progress">
                            <div class="progress">
                                <div class="progress-bar bg-success" id="overall-health">85%</div>
                            </div>
                        </div>
                    </div>
                    <div class="health-item">
                        <div class="health-label">Data Completeness</div>
                        <div class="health-progress">
                            <div class="progress">
                                <div class="progress-bar bg-info" id="data-completeness">92%</div>
                            </div>
                        </div>
                    </div>
                    <div class="health-item">
                        <div class="health-label">Verification Rate</div>
                        <div class="health-progress">
                            <div class="progress">
                                <div class="progress-bar bg-warning" id="verification-rate">78%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Dashboard component functionality
function updateDashboardStats(data) {
    document.getElementById('dashboard-total').textContent = data.total || 0;
    document.getElementById('dashboard-active').textContent = data.active || 0;
    document.getElementById('dashboard-pending').textContent = data.pending || 0;
    document.getElementById('dashboard-verified').textContent = data.verified || 0;
}

function updateActivityList(activities) {
    const activityList = document.getElementById('activity-list');
    if (!activityList) return;

    if (activities.length === 0) {
        activityList.innerHTML = '<p class="text-muted text-center">No recent activity</p>';
        return;
    }

    activityList.innerHTML = activities.map(activity => `
        <div class="activity-item">
            <div class="activity-icon">
                <i class="fas ${getActivityIcon(activity.type)}"></i>
            </div>
            <div class="activity-content">
                <div class="activity-title">${activity.title}</div>
                <div class="activity-time">${activity.timestamp}</div>
            </div>
        </div>
    `).join('');
}

function getActivityIcon(type) {
    const icons = {
        'created': 'fa-plus-circle',
        'updated': 'fa-edit',
        'exported': 'fa-download',
        'verified': 'fa-shield-alt',
        'error': 'fa-exclamation-triangle'
    };
    return icons[type] || 'fa-info-circle';
}

function updateHealthIndicators(health) {
    if (health.overall) {
        const overallBar = document.getElementById('overall-health');
        overallBar.style.width = `${health.overall}%`;
        overallBar.textContent = `${health.overall}%`;
    }
    
    if (health.completeness) {
        const completenessBar = document.getElementById('data-completeness');
        completenessBar.style.width = `${health.completeness}%`;
        completenessBar.textContent = `${health.completeness}%`;
    }
    
    if (health.verification) {
        const verificationBar = document.getElementById('verification-rate');
        verificationBar.style.width = `${health.verification}%`;
        verificationBar.textContent = `${health.verification}%`;
    }
}
</script>
