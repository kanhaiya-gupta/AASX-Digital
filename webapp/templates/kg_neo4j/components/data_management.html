<!-- Data Management Component -->
<div class="kg-data-management-container data-management-container">
    <div class="kg-data-card card">
        <div class="kg-card-header card-header">
            <h5 class="kg-card-title card-title">
                <i class="fas fa-database"></i>
                Data Management
            </h5>
        </div>
        <div class="kg-card-body card-body">
            <!-- Selection Display -->
            <div class="kg-selection-display selection-display-container mb-3">
                <div class="kg-alert alert alert-info">
                    <strong>Current Selection:</strong>
                    <span id="selection-display">No selection</span>
                </div>
            </div>

            <!-- Import Section -->
            <div class="kg-import-section import-section mb-4">
                <h6 class="kg-section-title section-title">
                    <i class="fas fa-upload"></i>
                    Import Data
                </h6>
                
                <div class="kg-dropdown-section dropdown-section">
                    <div class="row">
                        <!-- Use Case Selection -->
                        <div class="col-md-4">
                            <div class="kg-form-group form-group">
                                <label for="use-case-select" class="kg-form-label">Use Case</label>
                                <select id="use-case-select" class="kg-form-control form-control use-case-select">
                                    <option value="">Select Use Case...</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Project Selection -->
                        <div class="col-md-4">
                            <div class="kg-form-group form-group">
                                <label for="project-select" class="kg-form-label">Project</label>
                                <select id="project-select" class="kg-form-control form-control" disabled>
                                    <option value="">Select Project...</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- File Selection -->
                        <div class="col-md-4">
                            <div class="kg-form-group form-group">
                                <label for="file-select" class="kg-form-label">File</label>
                                <select id="file-select" class="kg-form-control form-control file-select" disabled>
                                    <option value="">Select File...</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="kg-import-actions row mt-3">
                    <div class="col-md-6">
                        <button id="import-data-btn" class="kg-btn kg-btn-import btn btn-primary" disabled>
                            <i class="fas fa-upload"></i>
                            Import File
                        </button>
                    </div>
                    <div class="col-md-6">
                        <button id="import-project-btn" class="kg-btn kg-btn-import-project btn btn-success" disabled>
                            <i class="fas fa-folder-open"></i>
                            Import All Project Files
                        </button>
                    </div>
                </div>
            </div>

            <!-- Export Section -->
            <div class="kg-export-section export-section mb-4">
                <h6 class="kg-section-title section-title">
                    <i class="fas fa-download"></i>
                    Export Data
                </h6>
                
                <div class="kg-export-content row">
                    <div class="col-md-6">
                        <div class="kg-form-group form-group">
                            <label for="export-format-select" class="kg-form-label">Export Format</label>
                            <select id="export-format-select" class="kg-form-control form-control">
                                <option value="json">JSON</option>
                                <option value="csv">CSV</option>
                                <option value="graphml">GraphML</option>
                                <option value="neo4j">Neo4j Dump</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="kg-form-group form-group">
                            <label class="kg-form-label">&nbsp;</label>
                            <button id="export-data-btn" class="kg-btn kg-btn-export btn btn-secondary btn-block" disabled>
                                <i class="fas fa-download"></i>
                                Export Data
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Import Status -->
            <div class="kg-import-status-section import-status-section">
                <h6 class="kg-section-title section-title">
                    <i class="fas fa-chart-bar"></i>
                    Import Status
                </h6>
                
                <div id="import-status" class="kg-status-container status-container">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="kg-status-item status-item">
                                <span class="kg-status-label status-label">Total Files:</span>
                                <span class="kg-status-value status-value">0</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="kg-status-item status-item">
                                <span class="kg-status-label status-label">Imported:</span>
                                <span class="kg-status-value status-value">0</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="kg-status-item status-item">
                                <span class="kg-status-label status-label">Pending:</span>
                                <span class="kg-status-value status-value">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading-indicator" class="kg-loading-container loading-container">
                <div class="spinner-border text-primary" role="status">
                    <span class="sr-only">Loading...</span>
                </div>
                <span class="loading-text ml-2"></span>
            </div>
        </div>
    </div>
</div>
