<!-- System Status Dashboard Component -->
<div class="kg-system-status row mb-4">
    <div class="col-12">
        <div class="kg-status-card card border-0 shadow-sm">
            <div class="kg-card-header card-header bg-gradient-primary text-white">
                <h5 class="kg-card-title mb-0">
                    <i class="fas fa-tachometer-alt me-2"></i>
                    System Status Dashboard
                </h5>
            </div>
            <div class="kg-card-body card-body">
                <div class="kg-status-grid row">
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="kg-status-item text-center">
                            <div class="kg-status-indicator status-indicator" id="status-docker">
                                <i class="fab fa-docker fa-2x text-muted"></i>
                            </div>
                            <small class="kg-status-label d-block mt-1">Docker Neo4j</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="kg-status-item text-center">
                            <div class="kg-status-indicator status-indicator" id="status-local">
                                <i class="fas fa-desktop fa-2x text-muted"></i>
                            </div>
                            <small class="kg-status-label d-block mt-1">Local Neo4j</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="kg-status-item text-center">
                            <div class="kg-status-indicator status-indicator" id="status-browser">
                                <i class="fas fa-globe fa-2x text-muted"></i>
                            </div>
                            <small class="kg-status-label d-block mt-1">Browser Access</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="kg-status-item text-center">
                            <div class="kg-status-indicator status-indicator" id="status-connection">
                                <i class="fas fa-plug fa-2x text-muted"></i>
                            </div>
                            <small class="kg-status-label d-block mt-1">Connection</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="kg-status-item text-center">
                            <div class="kg-status-indicator status-indicator" id="status-data">
                                <i class="fas fa-database fa-2x text-muted"></i>
                            </div>
                            <small class="kg-status-label d-block mt-1">Data Loaded</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="kg-status-item text-center">
                            <div class="kg-status-indicator status-indicator" id="status-performance">
                                <i class="fas fa-chart-line fa-2x text-muted"></i>
                            </div>
                            <small class="kg-status-label d-block mt-1">Performance</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
