<!-- Enhanced Analytics Dashboard Component -->
<div class="kg-analytics-dashboard row mb-4">
    <div class="col-12">
        <div class="kg-analytics-card card border-0 shadow-lg">
            <div class="kg-card-header card-header bg-gradient-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="kg-card-title mb-0">
                    <i class="fas fa-chart-bar me-2"></i>
                    Graph Analytics Dashboard
                </h5>
                <button class="btn btn-outline-light btn-sm" onclick="refreshAnalytics()">
                    <i class="fas fa-sync-alt me-1"></i>Refresh
                </button>
            </div>
            <div class="kg-card-body card-body">
                <div class="kg-analytics-grid row g-4">
                    <div class="col-md-3">
                        <div class="kg-analytics-item text-center p-3 bg-gradient-light rounded shadow-sm">
                            <div class="kg-analytics-icon mb-2">
                                <i class="fas fa-circle-nodes fa-2x text-primary"></i>
                            </div>
                            <h4 class="kg-analytics-value text-primary fw-bold mb-1" id="total-nodes">1,247</h4>
                            <small class="kg-analytics-label text-muted fw-semibold">Total Nodes</small>
                            <div class="kg-analytics-trend mt-2">
                                <span class="badge bg-success">
                                    <i class="fas fa-arrow-up me-1"></i>+12%
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="kg-analytics-item text-center p-3 bg-gradient-light rounded shadow-sm">
                            <div class="kg-analytics-icon mb-2">
                                <i class="fas fa-project-diagram fa-2x text-success"></i>
                            </div>
                            <h4 class="kg-analytics-value text-success fw-bold mb-1" id="total-relationships">3,891</h4>
                            <small class="kg-analytics-label text-muted fw-semibold">Total Relationships</small>
                            <div class="kg-analytics-trend mt-2">
                                <span class="badge bg-success">
                                    <i class="fas fa-arrow-up me-1"></i>+8%
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="kg-analytics-item text-center p-3 bg-gradient-light rounded shadow-sm">
                            <div class="kg-analytics-icon mb-2">
                                <i class="fas fa-tags fa-2x text-info"></i>
                            </div>
                            <h4 class="kg-analytics-value text-info fw-bold mb-1" id="total-labels">24</h4>
                            <small class="kg-analytics-label text-muted fw-semibold">Node Labels</small>
                            <div class="kg-analytics-trend mt-2">
                                <span class="badge bg-info">
                                    <i class="fas fa-plus me-1"></i>+2
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="kg-analytics-item text-center p-3 bg-gradient-light rounded shadow-sm">
                            <div class="kg-analytics-icon mb-2">
                                <i class="fas fa-link fa-2x text-warning"></i>
                            </div>
                            <h4 class="kg-analytics-value text-warning fw-bold mb-1" id="total-types">18</h4>
                            <small class="kg-analytics-label text-muted fw-semibold">Relationship Types</small>
                            <div class="kg-analytics-trend mt-2">
                                <span class="badge bg-warning text-dark">
                                    <i class="fas fa-plus me-1"></i>+1
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Enhanced Performance Metrics -->
                <div class="kg-performance-metrics mt-4">
                    <h6 class="kg-section-title mb-3">
                        <i class="fas fa-tachometer-alt me-2"></i>
                        Performance Metrics
                    </h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="kg-metric-card p-3 bg-light rounded">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="fw-semibold">Query Performance</span>
                                    <span class="text-success fw-bold">98%</span>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar bg-success" style="width: 98%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="kg-metric-card p-3 bg-light rounded">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="fw-semibold">Memory Usage</span>
                                    <span class="text-info fw-bold">67%</span>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar bg-info" style="width: 67%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Enhanced Graph Statistics -->
                <div class="kg-graph-stats mt-4">
                    <h6 class="kg-section-title mb-3">
                        <i class="fas fa-chart-line me-2"></i>
                        Graph Statistics
                    </h6>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="kg-stat-card p-3 bg-gradient-light rounded text-center">
                                <i class="fas fa-clock fa-2x text-primary mb-2"></i>
                                <h6 class="mb-1">Average Query Time</h6>
                                <span class="text-primary fw-bold">45ms</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="kg-stat-card p-3 bg-gradient-light rounded text-center">
                                <i class="fas fa-database fa-2x text-success mb-2"></i>
                                <h6 class="mb-1">Database Size</h6>
                                <span class="text-success fw-bold">2.4GB</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="kg-stat-card p-3 bg-gradient-light rounded text-center">
                                <i class="fas fa-users fa-2x text-info mb-2"></i>
                                <h6 class="mb-1">Active Connections</h6>
                                <span class="text-info fw-bold">12</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
