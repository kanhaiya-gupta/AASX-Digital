<!-- Analytics Dashboard Component -->
<div class="kg-analytics-dashboard row mb-4">
    <div class="col-12">
        <div class="kg-analytics-card card border-0 shadow-sm">
            <div class="kg-card-header card-header bg-gradient-danger text-white">
                <h5 class="kg-card-title mb-0">
                    <i class="fas fa-chart-bar me-2"></i>
                    Graph Analytics Dashboard
                </h5>
            </div>
            <div class="kg-card-body card-body">
                <div class="kg-analytics-grid row">
                    <div class="col-md-3">
                        <div class="kg-analytics-item text-center">
                            <h4 class="kg-analytics-value" id="total-nodes">0</h4>
                            <small class="kg-analytics-label text-muted">Total Nodes</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="kg-analytics-item text-center">
                            <h4 class="kg-analytics-value" id="total-relationships">0</h4>
                            <small class="kg-analytics-label text-muted">Total Relationships</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="kg-analytics-item text-center">
                            <h4 class="kg-analytics-value" id="total-labels">0</h4>
                            <small class="kg-analytics-label text-muted">Node Labels</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="kg-analytics-item text-center">
                            <h4 class="kg-analytics-value" id="total-types">0</h4>
                            <small class="kg-analytics-label text-muted">Relationship Types</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
