<!-- Federation Metrics Component -->
<div class="fl-federation-metrics row mb-4">
    <div class="col-12">
        <div class="fl-metrics-card card fl-federated-card">
            <div class="fl-card-header card-header fl-bg-gradient-federated text-white">
                <h5 class="fl-card-title mb-0">
                    <i class="fas fa-chart-bar me-2"></i>
                    Federation Metrics
                </h5>
            </div>
            <div class="fl-card-body card-body">
                <div class="fl-metrics-content row">
                    <div class="col-md-6">
                        <canvas id="federationChart" class="fl-chart" height="200"></canvas>
                    </div>
                    <div class="col-md-6">
                        <div id="federationMetrics" class="fl-metrics-data">
                            <!-- Federation metrics will be populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
