<!-- Enhanced Real-time Metrics Component -->
<div class="fl-real-time-metrics row mb-4">
    <div class="col-12">
        <div class="fl-realtime-card card fl-federated-card border-0 shadow-lg">
            <div class="fl-card-header card-header bg-gradient-primary text-white">
                <div class="fl-header-content d-flex justify-content-between align-items-center">
                    <h5 class="fl-card-title mb-0">
                        <i class="fas fa-wifi me-2"></i>
                        Real-time Monitoring
                    </h5>
                    <div class="d-flex align-items-center gap-2">
                        <span class="fl-connection-badge badge bg-success" id="connectionStatus">
                            <i class="fas fa-circle me-1"></i>Connected
                        </span>
                        <button class="btn btn-outline-light btn-sm" onclick="refreshRealTimeMetrics()">
                            <i class="fas fa-sync-alt me-1"></i>Refresh
                        </button>
                    </div>
                </div>
            </div>
            <div class="fl-card-body card-body">
                <div class="fl-realtime-content row g-4">
                    <div class="col-md-8">
                        <div class="fl-chart-container p-3 bg-light rounded">
                            <h6 class="fw-semibold mb-3">Live Performance Metrics</h6>
                            <canvas id="realTimeChart" class="fl-chart" height="150"></canvas>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div id="realTimeMetrics" class="fl-realtime-data">
                            <!-- Enhanced Real-time Metrics -->
                            <div class="fl-realtime-card mb-4 p-3 bg-light rounded">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="fl-realtime-icon me-3">
                                        <i class="fas fa-tachometer-alt fa-2x text-primary"></i>
                                        <div class="fl-status-dot fl-status-dot-success"></div>
                                    </div>
                                    <div>
                                        <h6 class="fw-semibold mb-1">Current Round</h6>
                                        <span class="badge bg-primary">#24 Active</span>
                                    </div>
                                </div>
                                <div class="fl-realtime-details">
                                    <div class="fl-detail-item d-flex justify-content-between mb-2">
                                        <span class="text-muted">Progress</span>
                                        <span class="fw-bold text-primary">67%</span>
                                    </div>
                                    <div class="fl-detail-item d-flex justify-content-between mb-2">
                                        <span class="text-muted">Time Left</span>
                                        <span class="fw-bold text-info">1.2s</span>
                                    </div>
                                    <div class="progress" style="height: 6px;">
                                        <div class="progress-bar bg-primary" style="width: 67%"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="fl-realtime-card mb-4 p-3 bg-light rounded">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="fl-realtime-icon me-3">
                                        <i class="fas fa-signal fa-2x text-success"></i>
                                        <div class="fl-status-dot fl-status-dot-success"></div>
                                    </div>
                                    <div>
                                        <h6 class="fw-semibold mb-1">Network Status</h6>
                                        <span class="badge bg-success">Optimal</span>
                                    </div>
                                </div>
                                <div class="fl-realtime-details">
                                    <div class="fl-detail-item d-flex justify-content-between mb-2">
                                        <span class="text-muted">Latency</span>
                                        <span class="fw-bold text-success">12ms</span>
                                    </div>
                                    <div class="fl-detail-item d-flex justify-content-between mb-2">
                                        <span class="text-muted">Throughput</span>
                                        <span class="fw-bold text-info">2.1 MB/s</span>
                                    </div>
                                    <div class="progress" style="height: 6px;">
                                        <div class="progress-bar bg-success" style="width: 95%"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="fl-realtime-card mb-4 p-3 bg-light rounded">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="fl-realtime-icon me-3">
                                        <i class="fas fa-memory fa-2x text-warning"></i>
                                        <div class="fl-status-dot fl-status-dot-success"></div>
                                    </div>
                                    <div>
                                        <h6 class="fw-semibold mb-1">Resource Usage</h6>
                                        <span class="badge bg-warning text-dark">Normal</span>
                                    </div>
                                </div>
                                <div class="fl-realtime-details">
                                    <div class="fl-detail-item d-flex justify-content-between mb-2">
                                        <span class="text-muted">CPU</span>
                                        <span class="fw-bold text-warning">23%</span>
                                    </div>
                                    <div class="fl-detail-item d-flex justify-content-between mb-2">
                                        <span class="text-muted">Memory</span>
                                        <span class="fw-bold text-info">1.2GB</span>
                                    </div>
                                    <div class="progress" style="height: 6px;">
                                        <div class="progress-bar bg-warning" style="width: 23%"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="fl-realtime-card p-3 bg-light rounded">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="fl-realtime-icon me-3">
                                        <i class="fas fa-exclamation-triangle fa-2x text-info"></i>
                                        <div class="fl-status-dot fl-status-dot-success"></div>
                                    </div>
                                    <div>
                                        <h6 class="fw-semibold mb-1">Alerts</h6>
                                        <span class="badge bg-info">0 Active</span>
                                    </div>
                                </div>
                                <div class="fl-realtime-details">
                                    <div class="fl-detail-item d-flex justify-content-between mb-2">
                                        <span class="text-muted">Critical</span>
                                        <span class="fw-bold text-success">0</span>
                                    </div>
                                    <div class="fl-detail-item d-flex justify-content-between mb-2">
                                        <span class="text-muted">Warnings</span>
                                        <span class="fw-bold text-warning">0</span>
                                    </div>
                                    <div class="progress" style="height: 6px;">
                                        <div class="progress-bar bg-success" style="width: 100%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
