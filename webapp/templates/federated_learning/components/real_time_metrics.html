<!-- Real-time Metrics Component -->
<div class="fl-real-time-metrics row mb-4">
    <div class="col-12">
        <div class="fl-realtime-card card fl-federated-card">
            <div class="fl-card-header card-header fl-bg-gradient-collaborative text-white">
                <div class="fl-header-content d-flex justify-content-between align-items-center">
                    <h5 class="fl-card-title mb-0">
                        <i class="fas fa-wifi me-2"></i>
                        Real-time Monitoring
                    </h5>
                    <span class="fl-connection-badge badge bg-light text-dark" id="connectionStatus">Connected</span>
                </div>
            </div>
            <div class="fl-card-body card-body">
                <div class="fl-realtime-content row">
                    <div class="col-md-8">
                        <canvas id="realTimeChart" class="fl-chart" height="150"></canvas>
                    </div>
                    <div class="col-md-4">
                        <div id="realTimeMetrics" class="fl-realtime-data">
                            <!-- Real-time metrics will be populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
