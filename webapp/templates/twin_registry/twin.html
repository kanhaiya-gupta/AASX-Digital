<!-- Add Twin Modal -->
<div class="modal fade" id="addTwinModal" tabindex="-1" aria-labelledby="addTwinModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addTwinModalLabel">
                    <i class="fas fa-plus-circle text-primary"></i>
                    Add New Digital Twin
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addTwinForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="twinId" class="form-label">Twin ID *</label>
                                <input type="text" class="form-control" id="twinId" required>
                                <div class="form-text">Unique identifier for the digital twin</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="twinName" class="form-label">Twin Name *</label>
                                <input type="text" class="form-control" id="twinName" required>
                                <div class="form-text">Human-readable name for the twin</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="twinType" class="form-label">Twin Type *</label>
                                <select class="form-select" id="twinType" required>
                                    <option value="">Select Type</option>
                                    <option value="additive_manufacturing">Additive Manufacturing</option>
                                    <option value="hydrogen_station">Hydrogen Station</option>
                                    <option value="quality_lab">Quality Lab</option>
                                    <option value="logistics">Logistics</option>
                                    <option value="energy">Energy</option>
                                    <option value="healthcare">Healthcare</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="aasId" class="form-label">AAS ID</label>
                                <input type="text" class="form-control" id="aasId">
                                <div class="form-text">Asset Administration Shell identifier</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" rows="3"></textarea>
                        <div class="form-text">Detailed description of the digital twin</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="metadata" class="form-label">Metadata (JSON)</label>
                        <textarea class="form-control" id="metadata" rows="4" placeholder='{"location": "Building A", "capacity": "1000 parts/day"}'></textarea>
                        <div class="form-text">Additional metadata in JSON format</div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-outline-primary" id="saveAsDraft">
                    <i class="fas fa-save"></i>
                    Save as Draft
                </button>
                <button type="button" class="btn btn-primary" id="createTwin">
                    <i class="fas fa-plus"></i>
                    Create Twin
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Auto-generation setup
function setupAutoGeneration() {
    // Auto-generate Twin ID when name is entered
    $('#twinName').on('input', function() {
        var name = $(this).val();
        if (name && !$('#twinId').val()) {
            var twinId = 'DT-' + name.replace(/[^a-zA-Z0-9]/g, '').toUpperCase().substring(0, 8);
            $('#twinId').val(twinId);
        }
    });
}

// Collect form data
function collectFormData() {
    return {
        twin_id: $('#twinId').val(),
        twin_name: $('#twinName').val(),
        twin_type: $('#twinType').val(),
        aas_id: $('#aasId').val(),
        description: $('#description').val(),
        metadata: parseMetadata($('#metadata').val())
    };
}

// Parse metadata JSON
function parseMetadata(metadataStr) {
    if (!metadataStr) return {};
    try {
        return JSON.parse(metadataStr);
    } catch (e) {
        return {};
    }
}

// Validate form data
function validateFormData(data, requireAll) {
    var errors = [];
    
    if (!data.twin_id) errors.push('Twin ID is required');
    if (!data.twin_name) errors.push('Twin Name is required');
    if (!data.twin_type) errors.push('Twin Type is required');
    
    if (requireAll && errors.length > 0) {
        alert('Please fix the following errors:\n' + errors.join('\n'));
        return false;
    }
    
    return true;
}

// Save twin as draft
function saveTwinAsDraft(formData) {
    // Mock implementation - would save to database
    console.log('Saving as draft:', formData);
    alert('Twin saved as draft successfully!');
    $('#addTwinModal').modal('hide');
}

// Create new twin
function createNewTwin(formData) {
    // Mock implementation - would create in database
    console.log('Creating twin:', formData);
    alert('Twin created successfully!');
    $('#addTwinModal').modal('hide');
    location.reload();
}
</script>
