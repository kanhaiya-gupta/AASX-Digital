<!-- Enhanced Twin Management Panel -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-gradient-info text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="fas fa-cogs me-2"></i>
                    Twin Registry Management
                </h5>
                <div class="btn-group" role="group">
                    <button class="btn btn-sm btn-outline-light" id="refreshEnhanced">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button class="btn btn-sm btn-outline-light" id="exportData">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button class="btn btn-sm btn-outline-light" id="importData">
                        <i class="fas fa-upload"></i> Import
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Action Buttons -->
                <div class="row mb-3">
                    <div class="col-md-8">
                        <div class="btn-group" role="group">
                            <button class="btn btn-primary" id="addTwin">
                                <i class="fas fa-plus me-2"></i>Create Twin
                            </button>
                            <button class="btn btn-success" id="bulkStartBtn" disabled>
                                <i class="fas fa-play me-2"></i>Start Selected
                            </button>
                            <button class="btn btn-warning" id="bulkStopBtn" disabled>
                                <i class="fas fa-stop me-2"></i>Stop Selected
                            </button>
                            <button class="btn btn-info" id="bulkSyncBtn" disabled>
                                <i class="fas fa-sync-alt me-2"></i>Sync Selected
                            </button>
                            <button class="btn btn-danger" id="bulkDeleteBtn" disabled>
                                <i class="fas fa-trash me-2"></i>Delete Selected
                            </button>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <input type="text" class="form-control" id="twinSearch" placeholder="Search twins...">
                            <button class="btn btn-outline-secondary" type="button">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Advanced Filtering -->
                <div class="row mb-3">
                    <div class="col-md-3">
                        <select class="form-select" id="typeFilter">
                            <option value="">All Types</option>
                            <option value="manufacturing">Manufacturing</option>
                            <option value="energy">Energy</option>
                            <option value="component">Component</option>
                            <option value="facility">Facility</option>
                            <option value="process">Process</option>
                            <option value="generic">Generic</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="statusFilter">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                            <option value="error">Error</option>
                            <option value="maintenance">Maintenance</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="ownerFilter">
                            <option value="">All Owners</option>
                            <option value="system">System</option>
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-outline-secondary w-100" id="clearFilters">
                            <i class="fas fa-times me-2"></i>Clear Filters
                        </button>
                    </div>
                </div>

                <!-- Enhanced Twin Table -->
                <div class="table-responsive">
                    <table class="table table-hover" id="twinRegistryTable">
                        <thead class="table-light">
                            <tr>
                                <th>
                                    <input type="checkbox" id="selectAll" class="form-check-input">
                                </th>
                                <th>Twin ID</th>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Health</th>
                                <th>Owner</th>
                                <th>Last Sync</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="twinTableBody">
                            <!-- Twin data will be loaded here -->
                        </tbody>
                    </table>
                </div>

                <!-- Loading State -->
                <div id="loadingTwins" class="text-center py-4" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="text-muted mt-2">Loading twin registry...</p>
                </div>

                <!-- Empty State -->
                <div id="emptyTwins" class="text-center py-4" style="display: none;">
                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                    <h5 class="text-muted">No Digital Twins Found</h5>
                    <p class="text-muted">Get started by creating a twin or using AASX Integration</p>
                    <button class="btn btn-primary" id="addTwinEmpty">
                        <i class="fas fa-plus me-2"></i>Create Your First Twin
                    </button>
                </div>

                <!-- Pagination -->
                <div class="row mt-3">
                    <div class="col-md-6">
                        <small class="text-muted">Showing <span id="showingStart">1</span> to <span id="showingEnd">10</span> of <span id="totalRecords">0</span> twins</small>
                    </div>
                    <div class="col-md-6 text-end">
                        <div class="btn-group" role="group">
                            <button class="btn btn-outline-secondary btn-sm" id="prevPage" disabled>
                                <i class="fas fa-chevron-left"></i> Previous
                            </button>
                            <button class="btn btn-outline-secondary btn-sm" id="nextPage" disabled>
                                Next <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
