<!-- System Status Dashboard - TOP PRIORITY -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-lg" style="border-left: 5px solid #007bff !important;">
            <div class="card-header bg-gradient-primary text-white" style="background: linear-gradient(135deg, #007bff 0%, #0056b3 100%) !important;">
                <h4 class="mb-0 fw-bold">
                    <i class="fas fa-tachometer-alt me-2"></i>
                    System Status Dashboard
                    <span class="badge bg-light text-primary ms-2">Live</span>
                </h4>
            </div>
            <div class="card-body" style="background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);">
                <div class="row">
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-registry" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-database fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Registry</small>
                            <small class="d-block text-muted">Online</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-aasx" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-file-archive fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">AASX Integration</small>
                            <small class="d-block text-muted">Active</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-realtime" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-wifi fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Real-time Sync</small>
                            <small class="d-block text-muted">Connected</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-performance" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-chart-line fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Performance</small>
                            <small class="d-block text-muted">Monitoring</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-health" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-heartbeat fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Health Monitor</small>
                            <small class="d-block text-muted">Healthy</small>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 col-6 mb-3">
                        <div class="text-center">
                            <div class="status-indicator online" id="status-alerts" style="background: rgba(40, 167, 69, 0.1); border-radius: 15px; padding: 15px;">
                                <i class="fas fa-bell fa-2x text-success"></i>
                            </div>
                            <small class="d-block mt-2 fw-bold text-success">Alerts</small>
                            <small class="d-block text-muted">Clear</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
