<!-- Analytics Widget for Twin Registry -->
<div class="card shadow h-100">
    <div class="card-header py-3 bg-gradient-info text-white">
        <div class="d-flex justify-content-between align-items-center">
            <h6 class="m-0 font-weight-bold">
                <i class="fas fa-chart-line me-2"></i>
                Twin Analytics Overview
            </h6>
            <div class="d-flex gap-2">
                <button class="btn btn-light btn-sm" onclick="refreshTwinAnalytics()">
                    <i class="fas fa-sync-alt me-1"></i>
                    Refresh
                </button>
                <a href="/analytics" class="btn btn-light btn-sm">
                    <i class="fas fa-external-link-alt me-1"></i>
                    Full Analytics
                </a>
            </div>
        </div>
    </div>
    <div class="card-body">
        <!-- Analytics Summary -->
        <div class="row mb-3">
            <div class="col-6 text-center">
                <div class="h4 text-primary mb-1" id="twin-quality-score">--</div>
                <div class="text-muted small">Quality Score</div>
            </div>
            <div class="col-6 text-center">
                <div class="h4 text-success mb-1" id="twin-performance">--</div>
                <div class="text-muted small">Performance</div>
            </div>
        </div>
        
        <!-- Mini Chart -->
        <div class="chart-container" style="position: relative; height:150px;">
            <canvas id="twinAnalyticsChart"></canvas>
        </div>
        
        <!-- Quick Actions -->
        <div class="row mt-3">
            <div class="col-12">
                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn btn-outline-primary btn-sm" onclick="viewTwinTrends()">
                        <i class="fas fa-chart-line me-1"></i>
                        Trends
                    </button>
                    <button class="btn btn-outline-success btn-sm" onclick="compareTwinPerformance()">
                        <i class="fas fa-balance-scale me-1"></i>
                        Compare
                    </button>
                    <button class="btn btn-outline-info btn-sm" onclick="exportTwinAnalytics()">
                        <i class="fas fa-download me-1"></i>
                        Export
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
