<!-- Analytics Dashboard Component -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="fas fa-chart-bar me-2"></i>Registry Analytics
        </h5>
        <div class="d-flex gap-2">
            <select class="form-select form-select-sm" id="timeRangeFilter">
                <option value="24h">Last 24 Hours</option>
                <option value="7d">Last 7 Days</option>
                <option value="30d" selected>Last 30 Days</option>
                <option value="90d">Last 90 Days</option>
            </select>
            <button class="btn btn-sm btn-outline-primary" onclick="generateReport()">
                <i class="fas fa-file-pdf me-2"></i>Generate Report
            </button>
            <button class="btn btn-sm btn-outline-success" onclick="exportData()">
                <i class="fas fa-download me-2"></i>Export Data
            </button>
        </div>
    </div>
    <div class="card-body">
        <!-- Analytics Overview -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card bg-primary text-white">
                    <div class="card-body text-center">
                        <h4 class="mb-0" id="totalTwinsAnalytics">0</h4>
                        <p class="mb-0">Total Twins</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white">
                    <div class="card-body text-center">
                        <h4 class="mb-0" id="avgHealthScore">0%</h4>
                        <p class="mb-0">Avg Health Score</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info text-white">
                    <div class="card-body text-center">
                        <h4 class="mb-0" id="totalEvents">0</h4>
                        <p class="mb-0">Total Events</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-white">
                    <div class="card-body text-center">
                        <h4 class="mb-0" id="uptimePercentage">0%</h4>
                        <p class="mb-0">Uptime</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Analytics Charts -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">Twin Growth Trend</h6>
                    </div>
                    <div class="card-body">
                        <div class="chart-container large">
                            <canvas id="twinGrowthChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">Health Score Distribution</h6>
                    </div>
                    <div class="card-body">
                        <div class="chart-container large">
                            <canvas id="healthDistributionChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Performance Metrics -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">Event Activity</h6>
                    </div>
                    <div class="card-body">
                        <div class="chart-container large">
                            <canvas id="eventActivityChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">Performance Trends</h6>
                    </div>
                    <div class="card-body">
                        <div class="chart-container large">
                            <canvas id="performanceTrendsChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Usage Statistics -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">Usage Statistics</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm">
                                <thead>
                                    <tr>
                                        <th>Metric</th>
                                        <th>Current</th>
                                        <th>Previous Period</th>
                                        <th>Change</th>
                                        <th>Trend</th>
                                    </tr>
                                </thead>
                                <tbody id="usageStatsTable">
                                    <!-- Usage statistics will be populated here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
