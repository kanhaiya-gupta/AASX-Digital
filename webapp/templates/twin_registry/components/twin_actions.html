<!-- Twin Actions Component -->
<div class="btn-group" role="group">
    <!-- Lifecycle Actions -->
    <div class="btn-group" role="group">
        <button type="button" class="btn btn-sm btn-outline-success" 
                onclick="startTwin('{{ twin.twin_id }}', 'user')" 
                title="Start Twin">
            <i class="fas fa-play"></i>
        </button>
        <button type="button" class="btn btn-sm btn-outline-warning" 
                onclick="stopTwin('{{ twin.twin_id }}', 'user')" 
                title="Stop Twin">
            <i class="fas fa-stop"></i>
        </button>
        <button type="button" class="btn btn-sm btn-outline-info" 
                onclick="syncTwin('{{ twin.twin_id }}', {}, 'user')" 
                title="Sync Twin">
            <i class="fas fa-sync"></i>
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary" 
                onclick="restartTwin('{{ twin.twin_id }}', 'user')" 
                title="Restart Twin">
            <i class="fas fa-redo"></i>
        </button>
    </div>
    
    <!-- Relationship Actions -->
    <div class="btn-group ms-1" role="group">
        <button type="button" class="btn btn-sm btn-outline-primary" 
                onclick="showRelationshipModal('{{ twin.twin_id }}')" 
                title="Manage Relationships">
            <i class="fas fa-link"></i>
        </button>
        <button type="button" class="btn btn-sm btn-outline-info" 
                onclick="showRelationships('{{ twin.twin_id }}')" 
                title="View Relationships">
            <i class="fas fa-sitemap"></i>
        </button>
    </div>
    
    <!-- Details Actions -->
    <div class="btn-group ms-1" role="group">
        <button type="button" class="btn btn-sm btn-outline-dark" 
                onclick="viewTwinDetails('{{ twin.twin_id }}')" 
                title="View Details">
            <i class="fas fa-eye"></i>
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary" 
                onclick="editTwin('{{ twin.twin_id }}')" 
                title="Edit Twin">
            <i class="fas fa-edit"></i>
        </button>
    </div>
</div>
