<!-- AASX Integration Section - ALWAYS VISIBLE -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-gradient-success text-white">
                <h5 class="mb-0">
                    <i class="fas fa-file-archive me-2"></i>
                    AASX Integration - Digital Twin Registration
                </h5>
            </div>
            <div class="card-body">
                <!-- Project Management -->
                <div class="row mb-3">
                    <div class="col-md-8">
                        <div class="btn-group" role="group">
                            <button class="btn btn-outline-primary" id="loadProjects">
                                <i class="fas fa-folder me-2"></i>Load Projects
                            </button>
                            <button class="btn btn-outline-success" id="registerAllTwins" style="display: none;">
                                <i class="fas fa-magic me-2"></i>Register All Twins
                            </button>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select id="projectSelect" class="form-select" style="display: none;">
                            <option value="">Choose a project...</option>
                        </select>
                    </div>
                </div>

                <!-- Projects List -->
                <div id="projectsList" style="display: none;">
                    <h6 class="text-primary mb-3">
                        <i class="fas fa-folder-open me-2"></i>Available Projects
                    </h6>
                    <div class="table-responsive">
                        <table class="table table-striped" id="projectsTable">
                            <thead class="table-light">
                                <tr>
                                    <th>Project ID</th>
                                    <th>Name</th>
                                    <th>Files</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Projects will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- AASX Files List -->
                <div id="aasxFilesList" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="text-primary mb-0">
                            <i class="fas fa-file-alt me-2"></i>Processed AASX Files
                        </h6>
                        <button class="btn btn-sm btn-outline-secondary" id="backToProjects">
                            <i class="fas fa-arrow-left me-2"></i>Back to Projects
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-striped" id="aasxFilesTable">
                            <thead class="table-light">
                                <tr>
                                    <th>File Name</th>
                                    <th>Project</th>
                                    <th>Processed At</th>
                                    <th>Twin Name</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- AASX files will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
