<!-- Include Modals -->
{% include 'twin_registry/components/twin_management.html' %}





<!-- Twin Details Modal -->
<div class="modal fade" id="twinDetailsModal" tabindex="-1" aria-labelledby="twinDetailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="twinDetailsModalLabel">
                    <i class="fas fa-info-circle text-primary me-2"></i>
                    Twin Details
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <!-- Basic Information -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">
                                    <i class="fas fa-info me-2"></i>
                                    Basic Information
                                </h6>
                            </div>
                            <div class="card-body" id="twinBasicInfo">
                                <!-- Basic info will be loaded here -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- Health & Status -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">
                                    <i class="fas fa-heartbeat me-2"></i>
                                    Health & Status
                                </h6>
                            </div>
                            <div class="card-body" id="twinHealthStatus">
                                <!-- Health info will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-3">
                    <!-- Configuration -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">
                                    <i class="fas fa-cogs me-2"></i>
                                    Configuration
                                </h6>
                            </div>
                            <div class="card-body" id="twinConfiguration">
                                <!-- Configuration will be loaded here -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- Recent Events -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">
                                    <i class="fas fa-history me-2"></i>
                                    Recent Events
                                </h6>
                            </div>
                            <div class="card-body" id="twinRecentEvents">
                                <!-- Recent events will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
