<!-- Relationship Modal Component -->
<div class="modal fade" id="twin_registry_relationshipModal" tabindex="-1" aria-labelledby="twin_registry_relationshipModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="twin_registry_relationshipModalLabel">
                    <i class="fas fa-link me-2"></i>Manage Twin Relationships
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Create New Relationship -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h6 class="mb-0">Create New Relationship</h6>
                    </div>
                    <div class="card-body">
                        <form id="twin_registry_relationshipForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="twin_registry_sourceTwinId" class="form-label">Source Twin</label>
                                    <select class="form-select" id="twin_registry_sourceTwinId" required>
                                        <option value="">Select Source Twin</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="twin_registry_targetTwinId" class="form-label">Target Twin</label>
                                    <select class="form-select" id="twin_registry_targetTwinId" required>
                                        <option value="">Select Target Twin</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-md-6">
                                    <label for="twin_registry_relationshipType" class="form-label">Relationship Type</label>
                                    <select class="form-select" id="twin_registry_relationshipType" required>
                                        <option value="">Select Type</option>
                                        <option value="parent-child">Parent-Child</option>
                                        <option value="dependency">Dependency</option>
                                        <option value="sibling">Sibling</option>
                                        <option value="composition">Composition</option>
                                        <option value="aggregation">Aggregation</option>
                                        <option value="association">Association</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="twin_registry_relationshipDescription" class="form-label">Description</label>
                                    <input type="text" class="form-control" id="twin_registry_relationshipDescription" placeholder="Optional description">
                                </div>
                            </div>
                            <div class="mt-3">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-plus me-2"></i>Create Relationship
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Existing Relationships -->
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">Existing Relationships</h6>
                    </div>
                    <div class="card-body">
                        <div id="twin_registry_existingRelationships">
                            <!-- Existing relationships will be populated here -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
