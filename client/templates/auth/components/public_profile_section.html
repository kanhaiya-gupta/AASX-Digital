<!-- Public Profile Section -->
<div class="auth-container" id="publicProfileSection">
    <div class="auth-card card">
        <div class="auth-card-header card-header">
            <h1 class="auth-card-title mb-0"><i class="fas fa-globe me-2"></i> Public Profile</h1>
            <p class="auth-card-subtitle mb-0">Manage your public profile information and visibility</p>
        </div>
        
        <div class="auth-card-body card-body">
            <div id="public-profile-alert-container"></div>
            
            <!-- Public Profile Status -->
            <div class="public-profile-status mb-4">
                <div class="status-header d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">
                        <i class="fas fa-eye me-2"></i>Profile Visibility
                    </h4>
                    <div class="visibility-toggle">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="isPublicToggle" name="isPublicToggle" 
                                   style="width: 3rem; height: 1.5rem;" title="Toggle profile visibility">
                            <label class="form-check-label fw-bold" for="isPublicToggle">
                                <span id="visibilityStatus">Private</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="status-description mt-2">
                    <p class="text-muted mb-0">
                        <i class="fas fa-info-circle me-2"></i>
                        <span id="visibilityDescription">Your profile is currently private and only visible to you.</span>
                    </p>
                </div>
            </div>
            
            <!-- Public Profile Form -->
            <form id="publicProfileForm" class="needs-validation" novalidate>
                <div class="row g-4">
                    <!-- Basic Information -->
                    <div class="col-lg-6 col-md-12">
                        <div class="auth-card card auth-profile-card h-100">
                            <div class="auth-card-header card-header">
                                <h5 class="auth-card-title">
                                    <i class="fas fa-user me-2"></i>Basic Information
                                </h5>
                            </div>
                            <div class="auth-card-body card-body p-4">
                                <div class="mb-4">
                                    <label for="location" class="form-label fw-bold">
                                        <i class="fas fa-map-marker-alt me-2"></i>Location
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-map-marker-alt"></i>
                                        </span>
                                        <input type="text" class="form-control auth-form-control" id="location" name="location" 
                                               placeholder="e.g., San Francisco, CA" title="Enter your city and country">
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label for="website" class="form-label fw-bold">
                                        <i class="fas fa-globe me-2"></i>Website
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-link"></i>
                                        </span>
                                        <input type="url" class="form-control auth-form-control" id="website" name="website" 
                                               placeholder="https://your-website.com" title="Enter your website URL">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Social Links -->
                    <div class="col-lg-6 col-md-12">
                        <div class="auth-card card auth-profile-card h-100">
                            <div class="auth-card-header card-header">
                                <h5 class="auth-card-title">
                                    <i class="fas fa-share-alt me-2"></i>Social Links
                                </h5>
                            </div>
                            <div class="auth-card-body card-body p-4">
                                <div class="mb-4">
                                    <label for="linkedin" class="form-label fw-bold">
                                        <i class="fab fa-linkedin me-2"></i>LinkedIn
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fab fa-linkedin"></i>
                                        </span>
                                        <input type="url" class="form-control auth-form-control" id="linkedin" name="linkedin" 
                                               placeholder="https://linkedin.com/in/yourprofile" title="Enter your LinkedIn profile URL">
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label for="github" class="form-label fw-bold">
                                        <i class="fab fa-github me-2"></i>GitHub
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fab fa-github"></i>
                                        </span>
                                        <input type="url" class="form-control auth-form-control" id="github" name="github" 
                                               placeholder="https://github.com/yourusername" title="Enter your GitHub profile URL">
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label for="twitter" class="form-label fw-bold">
                                        <i class="fab fa-twitter me-2"></i>Twitter
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fab fa-twitter"></i>
                                        </span>
                                        <input type="url" class="form-control auth-form-control" id="twitter" name="twitter" 
                                               placeholder="https://twitter.com/yourusername" title="Enter your Twitter profile URL">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Skills -->
                    <div class="col-lg-6 col-md-12">
                        <div class="auth-card card auth-profile-card h-100">
                            <div class="auth-card-header card-header">
                                <h5 class="auth-card-title">
                                    <i class="fas fa-tools me-2"></i>Skills
                                </h5>
                            </div>
                            <div class="auth-card-body card-body p-4">
                                <div class="mb-4">
                                    <label for="skills" class="form-label fw-bold">
                                        <i class="fas fa-tags me-2"></i>Skills (comma-separated)
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-tags"></i>
                                        </span>
                                        <input type="text" class="form-control auth-form-control" id="skills" name="skills" 
                                               placeholder="e.g., Python, FastAPI, React, Docker" title="Enter your skills separated by commas">
                                    </div>
                                    <small class="form-text text-muted">Enter skills separated by commas</small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Interests -->
                    <div class="col-lg-6 col-md-12">
                        <div class="auth-card card auth-profile-card h-100">
                            <div class="auth-card-header card-header">
                                <h5 class="auth-card-title">
                                    <i class="fas fa-heart me-2"></i>Interests
                                </h5>
                            </div>
                            <div class="auth-card-body card-body p-4">
                                <div class="mb-4">
                                    <label for="interests" class="form-label fw-bold">
                                        <i class="fas fa-star me-2"></i>Interests (comma-separated)
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-star"></i>
                                        </span>
                                        <input type="text" class="form-control auth-form-control" id="interests" name="interests" 
                                               placeholder="e.g., AI/ML, Web Development, Open Source" title="Enter your interests separated by commas">
                                    </div>
                                    <small class="form-text text-muted">Enter interests separated by commas</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="auth-form-actions mt-4">
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="button" class="auth-btn auth-btn-secondary" id="resetPublicProfile" 
                                title="Reset form to default values">
                            <i class="fas fa-undo me-2"></i>Reset
                        </button>
                        <button type="submit" class="auth-btn auth-btn-primary" 
                                title="Save your public profile information">
                            <i class="fas fa-save me-2"></i>Save Public Profile
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
