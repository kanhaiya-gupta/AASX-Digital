<!-- Preferences Section -->
<div class="auth-container-fluid container-fluid">
        <!-- Page Header -->
        <div class="auth-row row mb-4">
            <div class="auth-col-12 col-12">
                <div class="auth-page-header d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="auth-page-title h4 mb-0">
                            <i class="fas fa-cog me-2"></i>
                            User Preferences
                        </h2>
                        <p class="auth-page-subtitle mb-0">Customize your account settings and preferences</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Preferences Form -->
        <div class="auth-row row">
            <div class="auth-col-12 col-12">
                <div class="auth-card card">
                    <div class="auth-card-header card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-user-cog me-2"></i>
                            Account Preferences
                        </h5>
                    </div>
                    <div class="auth-card-body card-body">
                        <form id="preferencesForm" data-action="save-preferences">
                            <!-- Notification Preferences -->
                            <div class="preferences-section mb-4">
                                <h6 class="text-primary mb-3">
                                    <i class="fas fa-bell me-2"></i>Notification Preferences
                                </h6>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="emailNotifications" name="emailNotifications" checked>
                                            <label class="form-check-label" for="emailNotifications">
                                                Email notifications
                                            </label>
                                        </div>
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="smsNotifications" name="smsNotifications">
                                            <label class="form-check-label" for="smsNotifications">
                                                SMS notifications
                                            </label>
                                        </div>
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="pushNotifications" name="pushNotifications" checked>
                                            <label class="form-check-label" for="pushNotifications">
                                                Push notifications
                                            </label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="securityAlerts" name="securityAlerts" checked>
                                            <label class="form-check-label" for="securityAlerts">
                                                Security alerts
                                            </label>
                                        </div>
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="weeklyReports" name="weeklyReports">
                                            <label class="form-check-label" for="weeklyReports">
                                                Weekly activity reports
                                            </label>
                                        </div>
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="marketingEmails" name="marketingEmails">
                                            <label class="form-check-label" for="marketingEmails">
                                                Marketing emails
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Privacy Preferences -->
                            <div class="preferences-section mb-4">
                                <h6 class="text-primary mb-3">
                                    <i class="fas fa-shield-alt me-2"></i>Privacy Preferences
                                </h6>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="profileVisibility" name="profileVisibility">
                                            <label class="form-check-label" for="profileVisibility">
                                                Make profile visible to other users
                                            </label>
                                        </div>
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="activitySharing" name="activitySharing">
                                            <label class="form-check-label" for="activitySharing">
                                                Share activity with team members
                                            </label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="dataAnalytics" name="dataAnalytics" checked>
                                            <label class="form-check-label" for="dataAnalytics">
                                                Allow data analytics
                                            </label>
                                        </div>
                                        <div class="form-check mb-2">
                                            <input class="form-check-input" type="checkbox" id="thirdPartySharing" name="thirdPartySharing">
                                            <label class="form-check-label" for="thirdPartySharing">
                                                Allow third-party data sharing
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Interface Preferences -->
                            <div class="preferences-section mb-4">
                                <h6 class="text-primary mb-3">
                                    <i class="fas fa-palette me-2"></i>Interface Preferences
                                </h6>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="themePreference" class="form-label">Theme</label>
                                            <select class="form-select" id="themePreference" name="themePreference">
                                                <option value="light">Light</option>
                                                <option value="dark">Dark</option>
                                                <option value="auto">Auto (System)</option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label for="languagePreference" class="form-label">Language</label>
                                            <select class="form-select" id="languagePreference" name="languagePreference">
                                                <option value="en">English</option>
                                                <option value="es">Spanish</option>
                                                <option value="fr">French</option>
                                                <option value="de">German</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="timezonePreference" class="form-label">Timezone</label>
                                            <select class="form-select" id="timezonePreference" name="timezonePreference">
                                                <option value="UTC">UTC</option>
                                                <option value="EST">Eastern Time</option>
                                                <option value="CST">Central Time</option>
                                                <option value="MST">Mountain Time</option>
                                                <option value="PST">Pacific Time</option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label for="dateFormatPreference" class="form-label">Date Format</label>
                                            <select class="form-select" id="dateFormatPreference" name="dateFormatPreference">
                                                <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                                                <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                                                <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Form Actions -->
                            <div class="auth-form-actions d-flex gap-2">
                                <button type="submit" class="auth-btn auth-btn-primary" id="savePreferences">
                                    <i class="fas fa-save me-2"></i>Save Preferences
                                </button>
                                <button type="button" class="auth-btn auth-btn-outline-secondary" id="resetPreferences" data-action="reset-preferences">
                                    <i class="fas fa-undo me-2"></i>Reset to Defaults
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alert Container -->
        <div id="preferences-alert-container" class="mt-4"></div>
    </div>
</div>
