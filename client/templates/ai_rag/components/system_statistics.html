<!-- Enhanced System Statistics Component -->
<div class="ai-rag-system-stats-card card border-0 shadow-lg mb-4">
    <div class="ai-rag-card-header card-header bg-gradient-info text-white">
        <div class="d-flex justify-content-between align-items-center">
            <h6 class="ai-rag-card-title mb-0">
                <i class="fas fa-chart-bar me-2"></i>
                System Statistics
            </h6>
            <div class="ai-rag-header-actions">
                <button class="ai-rag-btn ai-rag-btn-refresh btn btn-sm btn-outline-light" onclick="refreshSystemStats()">
                    <i class="fas fa-sync-alt me-1"></i>Refresh
                </button>
            </div>
        </div>
    </div>
    <div class="ai-rag-card-body card-body p-4" id="system-stats">
        <div class="ai-rag-loading-state text-center">
            <div class="ai-rag-loading-animation">
                <div class="ai-rag-loading-dots">
                    <div class="ai-rag-loading-dot"></div>
                    <div class="ai-rag-loading-dot"></div>
                    <div class="ai-rag-loading-dot"></div>
                </div>
            </div>
            <p class="mt-3 text-muted fw-bold">Loading statistics...</p>
        </div>
    </div>
</div>
