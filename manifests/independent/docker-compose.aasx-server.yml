version: '3.8'

services:
  aasx-server:
    container_name: aasx-server
    hostname: aasx-server
    image: docker.io/adminshellio/aasx-server-blazor-for-demo:main
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ../../data/aasx-examples:/usr/share/aasxs
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ASPNETCORE_HTTP_PORTS=5001
    command: --start-index 0 --no-security --edit --data-path /usr/share/aasxs --external-blazor http://+:5001
    networks:
      - aasx-network

networks:
  aasx-network:
    driver: bridge 