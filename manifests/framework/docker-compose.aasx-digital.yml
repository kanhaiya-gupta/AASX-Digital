version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: aasx-digital-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../../nginx/ssl:/etc/nginx/ssl
      - ../../logs/nginx:/var/log/nginx
    depends_on:
      - webapp
    networks:
      - aasx-digital-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aasx-nginx.rule=Host(`www.aasx-digital.de`)"

  # Neo4j Database
  neo4j:
    image: neo4j:5.15
    container_name: aasx-digital-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-aasx-digital-secure-password}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_initial__size: 2G
      NEO4J_dbms_memory_heap_max__size: 4G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - aasx-digital-network
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aasx-digital-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # GRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aasx-digital-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aasx-digital-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aasx-digital-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AASX Digital Twin Analytics Framework Webapp (FastAPI) - Main Application
  webapp:
    build:
      context: ../..
      dockerfile: docker/framework/Dockerfile.aasx-digital
    container_name: aasx-digital-webapp
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-aasx-digital-secure-password}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-aasx-digital-production-secret-key}
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=4
      - RELOAD=false
      - ACCESS_LOG=true
      - LOG_LEVEL=INFO
    volumes:
      - ../../data:/app/data
      - ../../output:/app/output
      - ../../logs:/app/logs
      - ../../src:/app/src
      - ../../webapp:/app/webapp
    depends_on:
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - aasx-digital-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backup Service
  backup:
    image: alpine:latest
    container_name: aasx-digital-backup
    volumes:
      - ../../backups:/backups
      - neo4j_data:/neo4j-data:ro
      - qdrant_data:/qdrant-data:ro
      - redis_data:/redis-data:ro
    networks:
      - aasx-digital-network
    restart: unless-stopped
    command: |
      sh -c "
        echo 'Backup service started'
        while true; do
          sleep 86400
          echo 'Running daily backup...'
          date > /backups/backup.log
        done
      "

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  qdrant_data:
  redis_data:

networks:
  aasx-digital-network:
    driver: bridge 