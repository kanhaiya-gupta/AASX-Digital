version: '3.8'

services:
  # Neo4j Database (Local Development)
  neo4j:
    image: neo4j:5.15
    container_name: aasx-digital-neo4j-local
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data_local:/data
      - neo4j_logs_local:/logs
      - neo4j_import_local:/var/lib/neo4j/import
      - neo4j_plugins_local:/plugins
    networks:
      - aasx-digital-local-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Qdrant Vector Database (Local Development)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aasx-digital-qdrant-local
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # GRPC
    volumes:
      - qdrant_data_local:/qdrant/storage
    networks:
      - aasx-digital-local-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Redis Cache (Local Development)
  redis:
    image: redis:7-alpine
    container_name: aasx-digital-redis-local
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data
    networks:
      - aasx-digital-local-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  neo4j_data_local:
    driver: local
  neo4j_logs_local:
    driver: local
  neo4j_import_local:
    driver: local
  neo4j_plugins_local:
    driver: local
  qdrant_data_local:
    driver: local
  redis_data_local:
    driver: local

networks:
  aasx-digital-local-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16 